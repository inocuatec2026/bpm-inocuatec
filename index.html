<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INOCUA°tec — Sistema BPM</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s}
:root{
  --sidebar-bg:#0B1F35;--sidebar-text:rgba(255,255,255,0.55);
  --sidebar-active:#4fc3f7;--sidebar-active-bg:rgba(79,195,247,0.08);
  --topbar-bg:rgba(11,31,53,0.92);--topbar-border:rgba(79,195,247,0.1);
  --bg:#081628;--bg2:rgba(255,255,255,0.04);--card:rgba(255,255,255,0.05);
  --card-border:rgba(255,255,255,0.08);--text:#e8f0f8;--text-muted:#7a9bbf;
  --accent:#1B4F72;--accent2:#1E8449;--input-bg:rgba(255,255,255,0.06);
  --input-border:rgba(255,255,255,0.12);--table-head:#0d2540;
  --table-row-hover:rgba(255,255,255,0.04);--dot-color:rgba(79,195,247,0.07);
  --sidebar-w:230px;
}
.app-wrap{display:flex;min-height:100vh;position:relative}
.app-wrap::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--dot-color) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0}
.app-wrap::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse,rgba(27,79,114,0.3) 0%,transparent 70%);pointer-events:none;z-index:0}
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;border-right:1px solid var(--card-border);transition:background 0.3s}
.logo-area{padding:26px 20px 18px;border-bottom:1px solid var(--card-border)}
.logo-name{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;line-height:1}
.logo-name span{color:var(--sidebar-active)}
.logo-name sup{font-size:0.5rem;color:var(--sidebar-active);vertical-align:super}
.logo-sub{font-size:0.65rem;color:var(--sidebar-text);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.nav{flex:1;padding:14px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;font-size:0.75rem;font-weight:500;color:var(--sidebar-text);cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;text-transform:uppercase;letter-spacing:0.4px}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.05);border-left-color:rgba(255,255,255,0.2)}
.nav-item.active{color:var(--sidebar-active);background:var(--sidebar-active-bg);border-left-color:var(--sidebar-active)}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:#E74C3C;color:#fff;font-size:0.58rem;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--card-border)}
.sidebar-footer .logo-name{font-size:0.82rem}
.sidebar-footer .logo-sub{font-size:0.58rem}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;position:relative;z-index:1;min-height:100vh}
.topbar{background:var(--topbar-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--topbar-border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left h1{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:#fff}
.topbar-left p{font-size:0.7rem;color:var(--text-muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--card-border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;position:relative}
.icon-btn:hover{background:rgba(79,195,247,0.12);border-color:rgba(79,195,247,0.3)}
.icon-btn .dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:#E74C3C;border:1.5px solid var(--bg)}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 4px;border-radius:20px;border:1px solid var(--card-border);background:var(--card);cursor:pointer;transition:all 0.2s}
.user-chip:hover{background:rgba(79,195,247,0.08)}
.avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1B4F72,#1E8449);display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;color:#fff}
.user-chip span{font-size:0.72rem;font-weight:500;color:var(--text)}
.content{padding:20px 24px 32px;flex:1}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:18px;margin-bottom:14px;backdrop-filter:blur(8px)}
.card h2{font-family:'Syne',sans-serif;color:var(--sidebar-active);margin-bottom:14px;font-size:0.95rem;border-bottom:1px solid var(--card-border);padding-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;transition:all 0.2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.kpi-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon-wrap svg{width:18px;height:18px}
.kpi-val{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;line-height:1}
.kpi-label{font-size:0.62rem;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.4px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.act-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--card-border);cursor:pointer;transition:all 0.15s}
.act-item:last-child{border-bottom:none}
.act-item:hover{background:rgba(255,255,255,0.03);margin:0 -8px;padding:9px 8px;border-radius:8px}
.act-icon-s{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon-s svg{width:14px;height:14px}
.act-name{font-size:0.72rem;font-weight:600;color:var(--text)}
.act-time{font-size:0.6rem;color:var(--text-muted);margin-top:1px}
.act-badge{font-size:0.57rem;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.mejora-item{margin-bottom:12px}
.mejora-item:last-child{margin-bottom:0}
.mejora-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.mejora-name{font-size:0.7rem;font-weight:500;flex:1;color:var(--text)}
.mejora-pct{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;color:var(--sidebar-active)}
.progress-bar{height:5px;background:rgba(255,255,255,0.07);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--sidebar-active));border-radius:10px}
.donut-wrap{display:flex;align-items:center;gap:16px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:0.68rem}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{color:var(--text);font-weight:500;flex:1}
.legend-pct{color:var(--text-muted);font-size:0.6rem}
.legend-count{font-weight:700;color:var(--text);min-width:16px;text-align:right}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:85px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:5px 5px 0 0;cursor:pointer;transition:opacity 0.2s}
.bar:hover{opacity:0.75}
.bar-val{font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:700;color:var(--text)}
.bar-x{display:flex;gap:8px;padding-top:5px;border-top:1px solid var(--card-border)}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:bold}
.badge.verde{background:rgba(30,132,73,0.2);color:#69f0ae}
.badge.rojo{background:rgba(192,57,43,0.2);color:#ff8a80}
.badge.amarillo{background:rgba(212,172,13,0.2);color:#FFD54F}
.badge.azul{background:rgba(27,79,114,0.3);color:#4fc3f7}
.badge.gris{background:rgba(136,136,136,0.2);color:#aaa}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#2471a3}
.btn-success{background:var(--accent2);color:white}.btn-success:hover{background:#239b56}
.btn-danger{background:#922B21;color:white}.btn-danger:hover{background:#c0392b}
.btn-pdf{background:#6C3483;color:white}.btn-pdf:hover{background:#8E44AD}
.btn-excel{background:#1E8449;color:white}
.btn-ia{background:#D35400;color:white;font-size:12px;padding:4px 9px}.btn-ia:hover{background:#E67E22}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-ghost{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--card-border)}.btn-ghost:hover{background:rgba(255,255,255,0.13)}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--input-border);border-radius:6px;font-size:13px;margin-bottom:10px;background:var(--input-bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--sidebar-active)}
label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:3px}
select option{background:#0d2540;color:#e8f0f8}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--table-head);color:var(--sidebar-active);padding:9px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700}
td{padding:9px 10px;border-bottom:1px solid var(--card-border);color:var(--text)}
tr:hover td{background:var(--table-row-hover)}
.alert{padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:13px}
.alert.info{background:rgba(27,79,114,0.2);color:#4fc3f7;border-left:3px solid #1B4F72}
.alert.error{background:rgba(192,57,43,0.2);color:#ff8a80;border-left:3px solid #C0392B}
.alert.success{background:rgba(30,132,73,0.2);color:#69f0ae;border-left:3px solid #1E8449}
.alert.warning{background:rgba(212,172,13,0.15);color:#FFD54F;border-left:3px solid #D4AC0D}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{text-align:center;padding:14px;background:var(--bg2);border-radius:8px;border:1px solid var(--card-border)}
.stat .num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--sidebar-active)}
.stat .label{font-size:11px;color:var(--text-muted);margin-top:3px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}
.login-wrap::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--dot-color) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.login-box{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:14px;padding:36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;z-index:1}
.login-box h2{font-family:'Syne',sans-serif;color:#fff;margin-bottom:4px;font-size:1.5rem}
.login-box h2 span{color:var(--sidebar-active)}
.login-box p{color:var(--text-muted);font-size:12px;margin-bottom:22px}
.item-row{padding:10px 0;border-bottom:1px solid var(--card-border)}
.item-row:last-child{border-bottom:none}
.item-texto{font-size:13px;margin-bottom:7px;color:var(--text)}
.estado-btns{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.estado-btn{padding:5px 11px;border:1.5px solid var(--card-border);border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold;background:transparent;color:var(--text-muted);transition:all 0.15s}
.estado-btn:hover{border-color:var(--sidebar-active);color:var(--text)}
.estado-btn.activo-C{background:rgba(30,132,73,0.25);border-color:#1E8449;color:#69f0ae}
.estado-btn.activo-NC{background:rgba(192,57,43,0.25);border-color:#C0392B;color:#ff8a80}
.estado-btn.activo-NA{background:rgba(136,136,136,0.2);border-color:#888;color:#aaa}
.nc-panel{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25);border-radius:6px;padding:12px;margin-top:8px}
.nc-panel h4{color:#ff8a80;font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.nc-sugerencia{background:rgba(230,126,34,0.08);border:1px solid rgba(230,126,34,0.2);border-radius:6px;padding:10px;margin-top:8px}
.nc-sugerencia h5{color:#FFB74D;font-size:11px;font-weight:bold;margin-bottom:7px}
.nc-campo{margin-bottom:7px}
.nc-campo label{font-size:10px;color:var(--text-muted);margin-bottom:2px}
.nc-campo textarea,.nc-campo select,.nc-campo input{margin-bottom:0;font-size:12px}
.nc-estado-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.nc-estado-btn{padding:3px 9px;border:1px solid var(--card-border);border-radius:10px;cursor:pointer;font-size:11px;font-weight:bold;background:transparent;color:var(--text-muted);transition:all 0.15s}
.nc-estado-btn.activo-pendiente{background:rgba(192,57,43,0.2);border-color:#C0392B;color:#ff8a80}
.nc-estado-btn.activo-enproceso{background:rgba(212,172,13,0.15);border-color:#D4AC0D;color:#FFD54F}
.nc-estado-btn.activo-verificada{background:rgba(27,79,114,0.3);border-color:#1B4F72;color:#4fc3f7}
.nc-estado-btn.activo-cerrada{background:rgba(30,132,73,0.2);border-color:#1E8449;color:#69f0ae}
.editor-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:7px}
.editor-item input{margin-bottom:0;flex:1}
.editor-modulo{border:1px solid var(--card-border);border-radius:8px;padding:12px;margin-bottom:10px;background:var(--bg2)}
.cliente-selector{background:rgba(27,79,114,0.1);border:1px solid rgba(27,79,114,0.3);border-radius:8px;padding:12px;margin-bottom:14px}
.cliente-selector h3{color:var(--sidebar-active);font-size:12px;font-weight:bold;margin-bottom:7px}
.cliente-card-sel{background:var(--bg2);border:1.5px solid var(--card-border);border-radius:6px;padding:9px;cursor:pointer;margin-bottom:5px;font-size:12px;transition:all 0.15s;color:var(--text)}
.cliente-card-sel:hover{border-color:var(--sidebar-active)}
.cliente-card-sel.seleccionado{border-color:var(--accent2);background:rgba(30,132,73,0.1)}
.nc-cliente-card{background:rgba(192,57,43,0.06);border:1px solid rgba(192,57,43,0.2);border-radius:6px;padding:12px;margin-bottom:10px}
.nc-cliente-card h4{color:#ff8a80;font-size:12px;margin-bottom:7px}
.nc-cliente-detalle{font-size:12px;color:var(--text-muted);margin-bottom:5px;line-height:1.5}
.nc-acciones-cliente{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center}
.detalle-modulo-header{background:var(--accent);color:white;padding:7px 10px;border-radius:4px;font-size:12px;font-weight:bold;margin-bottom:7px;display:flex;justify-content:space-between}
.detalle-item{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--card-border);font-size:12px}
.detalle-item:last-child{border-bottom:none}
.tag-C{color:#69f0ae;font-weight:bold;min-width:34px}
.tag-NC{color:#ff8a80;font-weight:bold;min-width:34px}
.tag-NA{color:var(--text-muted);font-weight:bold;min-width:34px}
.tag-vacio{color:rgba(255,255,255,0.2);font-weight:bold;min-width:34px}
.firma-canvas{border:1px solid var(--card-border);border-radius:6px;cursor:crosshair;touch-action:none;background:rgba(255,255,255,0.04);display:block}
.historial-barra-wrap{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.historial-barra{height:18px;border-radius:4px;transition:width 0.3s;min-width:3px}
.upload-area{border:1.5px dashed var(--card-border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;margin-top:7px;transition:border-color 0.2s}
.upload-area:hover{border-color:var(--sidebar-active);background:rgba(79,195,247,0.04)}
.foto-wrap{position:relative;border-radius:5px;overflow:hidden;border:1px solid var(--card-border)}
.foto-wrap:hover .foto-overlay{opacity:1}
.foto-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;opacity:0;transition:opacity 0.2s}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.foto-pdf{display:flex;align-items:center;justify-content:center;height:100px;color:#8E44AD;font-size:12px;font-weight:bold;flex-direction:column;gap:3px;cursor:pointer}
.theme-panel{position:fixed;top:0;right:0;bottom:0;width:300px;background:rgba(8,22,40,0.97);backdrop-filter:blur(20px);border-left:1px solid var(--card-border);z-index:500;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.theme-panel.open{transform:translateX(0)}
.theme-panel-header{padding:18px 18px 14px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(8,22,40,0.98);z-index:1}
.theme-panel-header h3{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:#fff}
.theme-panel-body{padding:18px}
.theme-section{margin-bottom:20px}
.theme-section-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--card-border)}
.theme-presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.preset-btn{padding:10px 8px;border-radius:8px;border:1.5px solid var(--card-border);cursor:pointer;text-align:center;transition:all 0.2s;font-size:11px;font-weight:600}
.preset-btn:hover{border-color:var(--sidebar-active)}
.preset-btn.active-preset{border-color:var(--sidebar-active);box-shadow:0 0 0 2px rgba(79,195,247,0.2)}
.color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.color-row label{font-size:11px;color:var(--text-muted);flex:1;margin-bottom:0}
.color-row input[type=color]{width:36px;height:28px;padding:2px;border-radius:5px;cursor:pointer;border:1px solid var(--card-border);background:transparent;margin-bottom:0}
.theme-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:499;opacity:0;pointer-events:none;transition:opacity 0.3s}
.theme-overlay.open{opacity:1;pointer-events:all}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi-card{animation:fadeUp 0.35s ease both}
.kpi-card:nth-child(1){animation-delay:0.05s}.kpi-card:nth-child(2){animation-delay:0.10s}
.kpi-card:nth-child(3){animation-delay:0.15s}.kpi-card:nth-child(4){animation-delay:0.20s}
.card{animation:fadeUp 0.35s ease both;animation-delay:0.25s}
::-webkit-scrollbar{width:5px;height:5px}

function FirmaTactil({onFirma,firmaGuardada}){
  const canvasRef=useRef();const dibujando=useRef(false);const [tieneFirma,setTieneFirma]=useState(!!firmaGuardada);
  useEffect(()=>{if(firmaGuardada&&canvasRef.current){const img=new Image();img.onload=()=>{const ctx=canvasRef.current.getContext('2d');ctx.clearRect(0,0,canvasRef.current.width,canvasRef.current.height);ctx.drawImage(img,0,0);};img.src=firmaGuardada;}},[firmaGuardada]);
  const getPos=(e,canvas)=>{const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;const scaleY=canvas.height/rect.height;const clientX=e.touches?e.touches[0].clientX:e.clientX;const clientY=e.touches?e.touches[0].clientY:e.clientY;return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};};
  const iniciar=(e)=>{e.preventDefault();dibujando.current=true;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');const pos=getPos(e,canvas);ctx.beginPath();ctx.moveTo(pos.x,pos.y);};
  const dibujar=(e)=>{e.preventDefault();if(!dibujando.current)return;const canvas=canvasRef.current;const ctx=canvas.getContext('2d');ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#4fc3f7';const pos=getPos(e,canvas);ctx.lineTo(pos.x,pos.y);ctx.stroke();setTieneFirma(true);};
  const terminar=(e)=>{e.preventDefault();dibujando.current=false;if(tieneFirma&&onFirma)onFirma(canvasRef.current.toDataURL());};
  const limpiar=()=>{const canvas=canvasRef.current;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);setTieneFirma(false);if(onFirma)onFirma(null);};

function SubirFotos({auditoriaId,ncIndex,soloLectura}){
  const carpeta=ncIndex!==undefined?auditoriaId+'/nc-'+ncIndex:auditoriaId+'/general';
  const [fotos,setFotos]=useState([]);const [subiendo,setSubiendo]=useState(false);const [msg,setMsg]=useState('');const [eliminando,setEliminando]=useState(null);const inputRef=useRef();
  useEffect(()=>{cargarFotos();},[carpeta]);

  const subirArchivo=async(e)=>{const files=Array.from(e.target.files);if(!files.length)return;setSubiendo(true);setMsg('');for(const file of files){const nombre=Date.now()+'_'+file.name;await supabase.storage.from('evidencias').upload(carpeta+'/'+nombre,file,{upsert:true});}setSubiendo(false);setMsg('OK: '+files.length+' archivo(s) subido(s)');setTimeout(()=>{cargarFotos();setMsg('');},1500);inputRef.current.value='';};

function exportarExcel(auditorias){

function EditorModulos({modulos,onGuardar}){

  const editarItem=(mi,ii,val)=>{setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:[...n[mi].items]};n[mi].items[ii]=val;return n;});};
  const agregarItem=(mi)=>{setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:[...n[mi].items,'Nuevo item']};return n;});};
  const eliminarItem=(mi,ii)=>{if(mods[mi].items.length<=1){alert('El modulo debe tener al menos un item.');return;}if(!confirm('Eliminar este item?'))return;setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:n[mi].items.filter((_,i)=>i!==ii)};return n;});};

  const navItems=[{key:'dashboard',label:'Inicio',icon:'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10'},{key:'nueva',label:'Nueva auditoría',icon:'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'},{key:'clientes',label:'Clientes',icon:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75'},{key:'editor',label:'Editor checklist',icon:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'}];
  const SidebarContent=()=>(<aside className="sidebar"><div className="logo-area"><div className="logo-name">INOCUA<sup>°</sup><span>tec</span></div><div className="logo-sub">Servicios</div></div><nav className="nav">{navItems.map(n=>(<div key={n.key} className={'nav-item'+(tab===n.key&&!auditoriaDetalle?' active':'')} onClick={()=>{setAuditoriaDetalle(null);setTab(n.key);}}><svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={n.icon}/></svg>{n.label}{n.key==='dashboard'&&ncPendientes>0&&<span className="nav-badge">{ncPendientes}</span>}</div>))}</nav><div className="sidebar-footer"><div className="logo-name">INOCUA<sup>°</sup><span>tec</span></div><div className="logo-sub">© 2024 Todos los derechos reservados</div></div></aside>);
  const TopbarContent=({titulo,subtitulo})=>(<div className="topbar"><div className="topbar-left"><h1>{titulo}</h1><p>{subtitulo}</p></div><div className="topbar-right">{ncPendientes>0&&(<div className="icon-btn" title={ncPendientes+' NCs pendientes'}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFB74D" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span className="dot"></span></div>)}<div className="icon-btn" title="Personalizar tema" onClick={()=>setThemeOpen(true)}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></div><div className="user-chip"><div className="avatar">CA</div><span>César A.</span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg></div><button className="btn btn-danger btn-sm" onClick={logout}>Salir</button></div></div>);
  return(<div className="app-wrap"><SidebarContent/><main className="main">{auditoriaDetalle?(<><TopbarContent titulo="Detalle de auditoría" subtitulo={auditoriaDetalle.establecimiento+' — '+auditoriaDetalle.fecha}/><div className="content"><DetalleAuditoria auditoria={auditoriaDetalle} onVolver={()=>setAuditoriaDetalle(null)} esCliente={false}/></div></>):(<><TopbarContent titulo={tab==='dashboard'?'¡Bienvenido, César!':tab==='nueva'?'Nueva auditoría':tab==='clientes'?'Gestión de clientes':'Editor de checklist'} subtitulo={tab==='dashboard'?'Dashboard INOCUA°tec — Panel Auditor':tab==='nueva'?'Completá el formulario de relevamiento BPM':tab==='clientes'?'Administrá el acceso de tus clientes':'Personalizá los módulos y criterios del checklist'}/><div className="content">{tab==='dashboard'&&<DashboardHome auditorias={auditorias} cargando={cargando} onEliminar={eliminarAuditoria} onVerDetalle={a=>setAuditoriaDetalle(a)}/>}{tab==='nueva'&&<NuevaAuditoria onGuardar={a=>{setAuditorias(p=>[a,...p]);}} modulos={modulos}/>}{tab==='clientes'&&<GestionClientes/>}{tab==='editor'&&<div className="card"><h2>✏️ Editor de módulos y criterios</h2><EditorModulos modulos={modulos} onGuardar={mods=>setModulos(mods)}/></div>}</div></>)}</main><Personalizador open={themeOpen} onClose={()=>setThemeOpen(false)}/></div>);
}

(async function keepAlive(){try{const last=localStorage.getItem('supa_ping');const ahora=Date.now();const CINCO_DIAS=5*24*60*60*1000;if(!last||(ahora-parseInt(last))>CINCO_DIAS){await supabase.from('clientes').select('id').limit(1);localStorage.setItem('supa_ping',ahora.toString());}}catch(e){}})();

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
