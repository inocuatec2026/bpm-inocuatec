// ── SUBIR Y GESTIONAR FOTOS ──────────────────────────────────────────────────
function SubirFotos({auditoriaId,ncIndex,soloLectura}){
  const carpeta=ncIndex!==undefined?auditoriaId+'/nc-'+ncIndex:auditoriaId+'/general';
  const [fotos,setFotos]=useState([]);
  const [subiendo,setSubiendo]=useState(false);
  const [msg,setMsg]=useState('');
  const [eliminando,setEliminando]=useState(null);
  const inputRef=useRef();

  useEffect(()=>{cargarFotos();},[carpeta]);

  const cargarFotos=async()=>{
    const {data,error}=await supabase.storage.from('evidencias').list(carpeta,{limit:100,sortBy:{column:'name',order:'asc'}});
    if(data&&!error&&data.length>0){
      const urls=data.map(f=>{
        const {data:u}=supabase.storage.from('evidencias').getPublicUrl(carpeta+'/'+f.name);
        return{name:f.name,url:u.publicUrl,path:carpeta+'/'+f.name};
      });
      setFotos(urls);
    } else {
      setFotos([]);
    }
  };

  const subirArchivo=async(e)=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    setSubiendo(true);setMsg('');
    for(const file of files){
      const nombre=Date.now()+'_'+file.name;
      await supabase.storage.from('evidencias').upload(carpeta+'/'+nombre,file,{upsert:true});
    }
    setSubiendo(false);
    setMsg('OK: '+files.length+' archivo(s) subido(s)');
    setTimeout(()=>{cargarFotos();setMsg('');},1500);
    inputRef.current.value='';
  };

  const eliminarFoto=async(foto)=>{
    if(!confirm('Eliminar este archivo?'))return;
    setEliminando(foto.name);
    const {error}=await supabase.storage.from('evidencias').remove([foto.path]);
    if(!error){
      setFotos(prev=>prev.filter(f=>f.name!==foto.name));
      setMsg('Archivo eliminado.');
      setTimeout(()=>setMsg(''),2000);
    }
    setEliminando(null);
  };

  const esImagen=(nombre)=>/\.(jpg|jpeg|png|gif|webp)$/i.test(nombre);
  const esPdf=(nombre)=>/\.pdf$/i.test(nombre);

  return(
    <div>
      {!soloLectura&&(
        <div className="upload-area" onClick={()=>inputRef.current.click()}>
          <div style={{fontSize:28}}>+</div>
          <p style={{color:'#999',fontSize:13,marginTop:6}}>Clic para subir fotos o documentos (JPG, PNG, PDF)</p>
          <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={subirArchivo}/>
        </div>
      )}
      {subiendo&&<div className="alert info" style={{marginTop:8}}>Subiendo archivos...</div>}
      {msg&&<div className="alert success" style={{marginTop:8}}>{msg}</div>}
      {fotos.length>0&&(
        <div className="foto-grid">
          {fotos.map((f,i)=>(
            <div key={i} className="foto-wrap">
              {esImagen(f.name)
                ?<img src={f.url} alt={f.name} style={{width:'100%',height:110,objectFit:'cover',display:'block',cursor:'pointer'}} onClick={()=>window.open(f.url,'_blank')}/>
                :<div className="foto-pdf" onClick={()=>window.open(f.url,'_blank')}>📄<span>PDF</span></div>
              }
              <div className="foto-overlay">
                <button className="btn btn-primary btn-sm" onClick={()=>window.open(f.url,'_blank')} style={{fontSize:11,padding:'4px 8px'}}>🔍 Ver</button>
                {!soloLectura&&(
                  <button className="btn btn-danger btn-sm" onClick={()=>eliminarFoto(f)} disabled={eliminando===f.name} style={{fontSize:11,padding:'4px 8px'}}>
                    {eliminando===f.name?'...':'🗑 Eliminar'}
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
      {fotos.length===0&&!subiendo&&<p style={{fontSize:12,color:'#999',marginTop:8}}>Sin evidencias cargadas.</p>}
    </div>
  );
}

function EditorModulos({modulos,onGuardar}){
  const [mods,setMods]=useState(()=>modulos.map(m=>({...m,items:[...m.items]})));
  const [guardado,setGuardado]=useState(false);
  const editarNombreMod=(mi,val)=>{setMods(prev=>{const n=[...prev];n[mi]={...n[mi],nombre:val};return n;});};
  const editarItem=(mi,ii,val)=>{setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:[...n[mi].items]};n[mi].items[ii]=val;return n;});};
  const agregarItem=(mi)=>{setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:[...n[mi].items,'Nuevo item']};return n;});};
  const eliminarItem=(mi,ii)=>{
    if(mods[mi].items.length<=1){alert('El modulo debe tener al menos un item.');return;}
    if(!confirm('Eliminar este item?'))return;
    setMods(prev=>{const n=[...prev];n[mi]={...n[mi],items:n[mi].items.filter((_,i)=>i!==ii)};return n;});
  };
  const guardar=()=>{localStorage.setItem('inocuatec_modulos',JSON.stringify(mods));onGuardar(mods);setGuardado(true);setTimeout(()=>setGuardado(false),3000);};
  const restaurar=()=>{
    if(!confirm('Restaurar todos los modulos a los valores originales?'))return;
    localStorage.removeItem('inocuatec_modulos');setMods(MODULOS_DEFAULT.map(m=>({...m,items:[...m.items]})));onGuardar(MODULOS_DEFAULT);
  };
  return(
    <div>
      {guardado&&<div className="alert success">Cambios guardados correctamente.</div>}
      <div className="alert info" style={{marginBottom:16}}>Podes editar items, agregar nuevos o eliminar los que no uses.</div>
      {mods.map((mod,mi)=>(
        <div className="editor-modulo" key={mi}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <span style={{background:'#1B4F72',color:'white',borderRadius:4,padding:'2px 8px',fontSize:12,fontWeight:'bold',whiteSpace:'nowrap'}}>Modulo {mi+1}</span>
            <input value={mod.nombre} onChange={e=>editarNombreMod(mi,e.target.value)} style={{marginBottom:0,fontWeight:'bold',color:'#1B4F72'}}/>
          </div>
          {mod.items.map((item,ii)=>(
            <div className="editor-item" key={ii}>
              <span style={{fontSize:12,color:'#999',minWidth:20,paddingTop:10}}>{ii+1}.</span>
              <input value={item} onChange={e=>editarItem(mi,ii,e.target.value)} style={{marginBottom:0}}/>
              <button className="btn btn-danger btn-sm" style={{marginTop:4,whiteSpace:'nowrap'}} onClick={()=>eliminarItem(mi,ii)}>✕</button>
            </div>
          ))}
          <button className="btn btn-success btn-sm" style={{marginTop:8}} onClick={()=>agregarItem(mi)}>+ Agregar item</button>
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <button className="btn btn-primary" onClick={guardar}>Guardar cambios</button>
        <button className="btn" style={{background:'#ECF0F1',color:'#555'}} onClick={restaurar}>Restaurar originales</button>
      </div>
    </div>
  );
}

function generarPDF(auditoria){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=15,TW=W-M*2;let y=15;
  const checkPage=()=>{if(y>270){doc.addPage();y=20;}};
  const escribirBloque=(etiqueta,texto,xEtiq,xTexto,anchoTexto)=>{
    const lines=doc.splitTextToSize(String(texto||''),anchoTexto);
    checkPage();doc.setFont('helvetica','bold');doc.text(etiqueta,xEtiq,y);doc.setFont('helvetica','normal');
    lines.forEach((l,li)=>{if(li>0)checkPage();doc.text(l,xTexto,y+li*4.5);});
    y+=lines.length*4.5+1;
  };
  doc.setFillColor(27,79,114);doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text('INOCUA tec Servicios',M,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Planilla de Relevamiento BPM - Modalidad A',M,19);
  doc.text('Cesar Orlando Alvarez Aguilar - Tec. Higiene y Seguridad Alimentaria',M,25);
  y=35;
  const mod=auditoria.modulos||{};
  doc.setFillColor(214,234,248);doc.rect(M,y-5,TW,36,'F');
  doc.setTextColor(27,79,114);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('DATOS DEL ESTABLECIMIENTO',M+2,y);y+=7;
  const campos=[['Establecimiento:',auditoria.establecimiento||'---'],['Responsable:',auditoria.responsable||'---'],['Fecha:',auditoria.fecha||'---'],['Rubro:',mod.rubro||'---'],['Domicilio:',mod.domicilio||'---'],['N Habilitacion:',mod.nroHab||'---']];
  doc.setTextColor(0,0,0);doc.setFontSize(9);
  campos.forEach(([k,v],i)=>{
    const col=i%2===0?M+2:M+97;const row=Math.floor(i/2);
    doc.setFont('helvetica','bold');doc.text(k,col,y+row*7);doc.setFont('helvetica','normal');doc.text(String(v).substring(0,38),col+32,y+row*7);
  });
  y+=26;
  if(mod.condiciones){checkPage();doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(80,80,80);
    const cLines=doc.splitTextToSize('Condiciones al inicio: '+String(mod.condiciones),TW-4);
    cLines.forEach(l=>{checkPage();doc.text(l,M+2,y);y+=4.5;});}
  y+=4;
  const estados=mod.estados||[];const obsMods=mod.observaciones_modulos||[];
  const modulosAuditoria=mod.modulos_snapshot||cargarModulos();
  modulosAuditoria.forEach((modulo,mi)=>{
    const estMod=estados[mi]||[];
    const cumple=estMod.filter(e=>e==='C').length;const nc=estMod.filter(e=>e==='NC').length;const na=estMod.filter(e=>e==='NA').length;
    const total=cumple+nc;const pMod=total>0?Math.round((cumple/total)*100):0;
    checkPage();doc.setFillColor(21,67,96);doc.rect(M,y-4,TW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('MODULO '+String(mi+1)+' - '+modulo.nombre.toUpperCase(),M+2,y+1);
    doc.text('[C]'+String(cumple)+' [NC]'+String(nc)+' [NA]'+String(na)+' | '+String(pMod)+'%',W-M-35,y+1);y+=10;
    modulo.items.forEach((item,ii)=>{
      checkPage();const est=estMod[ii];const tag=est==='C'?'[C] ':est==='NC'?'[NC]':est==='NA'?'[NA]':'[--]';
      const color=est==='C'?[30,132,73]:est==='NC'?[192,57,43]:[100,100,100];
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...color);doc.text(tag,M+2,y);
      doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
      const lines=doc.splitTextToSize(item,TW-16);
      lines.forEach((l,li)=>{checkPage();doc.text(l,M+14,y+li*4);});y+=lines.length*4+2;
    });
    if(obsMods[mi]&&obsMods[mi].trim()){
      checkPage();doc.setFillColor(255,253,231);
      const obsLines=doc.splitTextToSize('Obs: '+obsMods[mi],TW-6);const obsH=obsLines.length*4.5+4;
      doc.rect(M,y-2,TW,obsH,'F');doc.setFontSize(7.5);doc.setFont('helvetica','italic');doc.setTextColor(100,80,0);
      obsLines.forEach((l,li)=>{checkPage();doc.text(l,M+3,y+1+li*4.5);});y+=obsH+3;}
    y+=4;
  });
  checkPage();y+=4;
  doc.setFillColor(27,79,114);doc.rect(M,y-4,TW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('RESUMEN EJECUTIVO DE CUMPLIMIENTO',M+2,y+1);y+=12;
  const resumen=mod.resumen||{};const puntaje=auditoria.puntaje||0;const resultado=auditoria.resultado||'---';
  doc.setFillColor(214,234,248);doc.rect(M,y-4,TW,12,'F');doc.setTextColor(0,0,0);doc.setFontSize(10);
  [['Cumplen: '+(resumen.cumple||0),M+5],['No cumplen: '+(resumen.noCumple||0),M+55],['Puntaje: '+puntaje+'%',M+110],['Resultado: '+resultado,M+148]].forEach(([txt,x])=>{
    doc.setFont('helvetica','bold');const esR=txt.includes('Resultado');
    if(esR&&resultado==='Aprobado')doc.setTextColor(30,132,73);else if(esR)doc.setTextColor(192,57,43);else doc.setTextColor(0,0,0);
    doc.text(txt,x,y+3);});
  y+=16;
  checkPage();doc.setFontSize(8);doc.setTextColor(0,0,0);
  doc.setFillColor(214,234,248);doc.rect(M,y-3,TW,7,'F');doc.setFont('helvetica','bold');

  modulosAuditoria.forEach((modulo,mi)=>{
    checkPage();const estMod=estados[mi]||[];
    const c=estMod.filter(e=>e==='C').length;const nc=estMod.filter(e=>e==='NC').length;const na=estMod.filter(e=>e==='NA').length;
    const t=c+nc;const p=t>0?Math.round((c/t)*100):0;
    if(mi%2===0){doc.setFillColor(248,249,250);doc.rect(M,y-3,TW,7,'F');}
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    doc.text(String(mi+1)+'. '+modulo.nombre,M+2,y+1);doc.text(String(c),M+107,y+1);doc.text(String(nc),M+130,y+1);doc.text(String(na),M+147,y+1);
    doc.setFont('helvetica','bold');doc.setTextColor(p>=80?30:192,p>=80?132:57,p>=80?73:43);doc.text(String(p)+'%',M+158,y+1);doc.setTextColor(0,0,0);y+=7;
  });
  const ncsConData=(mod.no_conformidades||[]).filter(nc=>nc&&nc.accion_correctiva);

  doc.setFillColor(192,57,43);doc.rect(M,y-4,TW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('REGISTRO DE NO CONFORMIDADES Y ACCIONES CORRECTIVAS',M+2,y+1);y+=12;
  if(ncsConData.length>0){
    ncsConData.forEach((nc,idx)=>{
      checkPage();doc.setFillColor(253,237,237);doc.rect(M,y-3,TW,7,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
      const tituloLines=doc.splitTextToSize('NC '+String(idx+1)+' | '+nc.modulo+' - '+nc.item,TW-4);
      tituloLines.forEach((l,li)=>{checkPage();doc.text(l,M+2,y+li*4.5);});y+=tituloLines.length*4.5+3;
      doc.setTextColor(0,0,0);
      escribirBloque('Correctiva:',nc.accion_correctiva,M+2,M+27,TW-30);
      if(nc.accion_preventiva)escribirBloque('Preventiva:',nc.accion_preventiva,M+2,M+27,TW-30);
      checkPage();doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);
      doc.text('Responsable:',M+2,y);doc.setFont('helvetica','normal');doc.text(String(nc.responsable||'---'),M+27,y);
      doc.setFont('helvetica','bold');doc.text('Plazo:',M+95,y);doc.setFont('helvetica','normal');doc.text(String(nc.plazo||'---'),M+108,y);
      doc.setFont('helvetica','bold');doc.text('Estado:',M+140,y);doc.setFont('helvetica','normal');doc.text(String(nc.estado||'Pendiente'),M+155,y);
      y+=8;doc.setDrawColor(220,220,220);doc.line(M,y-2,W-M,y-2);y+=3;
    });
  } else {
    doc.setFillColor(248,249,250);doc.rect(M,y-3,TW,7,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(0,0,0);
    doc.text('Sin no conformidades con acciones correctivas registradas.',M+2,y+1);y+=8;
  }
  y+=15;checkPage();
  doc.setDrawColor(100,100,100);doc.line(M,y,M+75,y);doc.line(M+105,y,W-M,y);y+=5;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  doc.text('Cesar Orlando Alvarez Aguilar',M,y);doc.text('Firma y aclaracion del responsable',M+105,y);y+=4;
  doc.text('Tec. Higiene y Seguridad Alimentaria',M,y);doc.text('Establecimiento: '+(auditoria.establecimiento||''),M+105,y);y+=4;
  doc.text('INOCUA tec Servicios - Auditoria BPM Modalidad A',M,y);
  const totalPags=doc.getNumberOfPages();
  for(let i=1;i<=totalPags;i++){
    doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text('INOCUA tec Servicios | Auditoria BPM | Pagina '+String(i)+' de '+String(totalPags),M,290);
    doc.text(new Date().toLocaleDateString('es-AR'),W-M-20,290);
  }
  doc.save('BPM_'+(auditoria.establecimiento||'auditoria')+'_'+(auditoria.fecha||'')+'.pdf');
}

function Login({onLogin}){
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [cargando,setCargando]=useState(false);const [error,setError]=useState('');
  const login=async()=>{
    if(!email||!pass){setError('Completa email y contrasena');return;}
    setCargando(true);setError('');
    const {data,error:e}=await supabase.auth.signInWithPassword({email,password:pass});
    if(e){setError('Email o contrasena incorrectos');setCargando(false);return;}
    const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',data.user.id).maybeSingle();
    setCargando(false);
    if(cliente)onLogin({tipo:'cliente',user:data.user,cliente});
    else onLogin({tipo:'auditor',user:data.user});
  };
  return(
    <div className="login-wrap"><div className="login-box">
      <h2>INOCUA tec</h2><p>Sistema de Auditorias BPM</p>
      {error&&<div className="alert error">{error}</div>}
      <label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com"/>
      <label>Contrasena</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="********" onKeyDown={e=>e.key==='Enter'&&login()}/>
      <button className="btn btn-primary" style={{width:'100%',marginTop:4}} onClick={login} disabled={cargando}>
        {cargando&&<span className="spinner"></span>}{cargando?'Ingresando...':'Ingresar'}
      </button>
    </div></div>
  );
}

function ModuloChecklist({moduloIdx,modulo,estados,obsMod,ncsModulo,onEstado,onObsMod,onNcChange}){
  const cumple=modulo.items.filter((_,i)=>estados[i]==='C').length;
  const noCumple=modulo.items.filter((_,i)=>estados[i]==='NC').length;
  const na=modulo.items.filter((_,i)=>estados[i]==='NA').length;
  return(
    <div className="card">
      <h2>{modulo.id+1}. {modulo.nombre}<span style={{float:'right',fontSize:11,fontWeight:'normal',color:'#666'}}>C:{cumple} NC:{noCumple} NA:{na}</span></h2>
      {modulo.items.map((texto,i)=>(
        <div className="item-row" key={i}>
          <p className="item-texto">{texto}</p>
          <div className="estado-btns">
            {['C','NC','NA'].map(v=>(
              <button key={v} className={'estado-btn'+(estados[i]===v?' activo-'+v:'')} onClick={()=>onEstado(i,estados[i]===v?null:v)}>
                {v==='C'?'✓ Cumple':v==='NC'?'✗ No cumple':'— N/A'}
              </button>
            ))}
          </div>
          {estados[i]==='NC'&&<PanelNC moduloIdx={moduloIdx} itemIdx={i} ncData={ncsModulo[i]||null} onChange={val=>onNcChange(i,val)}/>}
        </div>
      ))}
      <div style={{marginTop:10}}>
        <label>Observaciones del modulo:</label>
        <textarea rows={2} placeholder="Observaciones, hallazgos..." value={obsMod||''} onChange={e=>onObsMod(e.target.value)} style={{background:'#FFFDE7',marginBottom:0}}/>
      </div>
    </div>
  );
}

function NuevaAuditoria({onGuardar,modulos}){
  const [clientes,setClientes]=useState([]);const [clienteSelId,setClienteSelId]=useState(null);
  const [estab,setEstab]=useState('');const [domicilio,setDomicilio]=useState('');const [nroHab,setNroHab]=useState('');
  const [rubro,setRubro]=useState('');const [resp,setResp]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [condiciones,setCondiciones]=useState('');
  const [estados,setEstados]=useState(()=>modulos.map(m=>Array(m.items.length).fill(null)));
  const [obsMod,setObsMod]=useState(Array(modulos.length).fill(''));
  const [ncs,setNcs]=useState(()=>modulos.map(m=>Array(m.items.length).fill(null)));
  const [guardando,setGuardando]=useState(false);const [guardado,setGuardado]=useState(false);
  const [error,setError]=useState('');const [auditGuardada,setAuditGuardada]=useState(null);
  const [cargandoClientes,setCargandoClientes]=useState(true);

  useEffect(()=>{
    (async()=>{
      const {data}=await supabase.from('clientes').select('*').order('establecimiento',{ascending:true});
      if(data)setClientes(data);
      setCargandoClientes(false);
    })();
  },[]);

  const seleccionarCliente=(c)=>{setClienteSelId(c.id);setEstab(c.establecimiento||'');setDomicilio(c.domicilio||'');setNroHab(c.nro_habilitacion||'');setRubro(c.rubro||'');};
  const limpiarCliente=()=>{setClienteSelId(null);setEstab('');setDomicilio('');setNroHab('');setRubro('');};
  const setEstado=(modId,itemIdx,val)=>{
    setEstados(prev=>{const n=[...prev];n[modId]=[...n[modId]];n[modId][itemIdx]=val;return n;});
    if(val!=='NC')setNcs(prev=>{const n=prev.map(a=>[...a]);n[modId][itemIdx]=null;return n;});
  };
  const setObsModulo=(modId,val)=>{setObsMod(prev=>{const n=[...prev];n[modId]=val;return n;});};
  const setNcData=(modId,itemIdx,val)=>{setNcs(prev=>{const n=prev.map(a=>[...a]);n[modId][itemIdx]=val;return n;});};
  const calcular=()=>{
    let cumple=0,noCumple=0,na=0;
    estados.forEach(mod=>mod.forEach(e=>{if(e==='C')cumple++;else if(e==='NC')noCumple++;else if(e==='NA')na++;}));
    const total=cumple+noCumple;return{puntaje:total>0?Math.round((cumple/total)*100):0,cumple,noCumple,na};
  };
  const aplanarNCs=()=>{
    const lista=[];
    ncs.forEach((modNcs,mi)=>{modNcs.forEach((nc,ii)=>{if(nc&&estados[mi][ii]==='NC')lista.push({modulo:modulos[mi].nombre,item:modulos[mi].items[ii],...nc});});});
    return lista;
  };
  const guardar=async()=>{
    if(!estab){alert('Selecciona o ingresa el nombre del establecimiento');return;}
    setGuardando(true);setError('');
    const {puntaje,cumple,noCumple,na}=calcular();
    const resultado=puntaje>=80?'Aprobado':'No aprobado';
    const modulosData={estados,observaciones_modulos:obsMod,domicilio,nroHab,rubro,condiciones,no_conformidades:aplanarNCs(),modulos_snapshot:modulos,resumen:{cumple,noCumple,na},
      detalle:modulos.map((m,mi)=>({nombre:m.nombre,cumple:estados[mi].filter(e=>e==='C').length,noCumple:estados[mi].filter(e=>e==='NC').length,na:estados[mi].filter(e=>e==='NA').length,obs:obsMod[mi]}))};
    const insertData={establecimiento:estab,responsable:resp,fecha,puntaje,resultado,modulos:modulosData};
    if(clienteSelId)insertData.cliente_id=clienteSelId;
    const {data,error:err}=await supabase.from('auditorias').insert([insertData]).select();
    setGuardando(false);if(err){setError('Error: '+err.message);return;}
    setAuditGuardada(data[0]);onGuardar(data[0]);setGuardado(true);
  };
  const ncTotal=aplanarNCs().filter(nc=>nc.accion_correctiva).length;
  const ncSinGestionar=estados.flat().filter(e=>e==='NC').length-ncTotal;

  if(guardado)return(
    <div className="card">
      <div className="alert success">Auditoria guardada correctamente.</div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <button className="btn btn-pdf" onClick={()=>generarPDF(auditGuardada)}>⬇ Descargar PDF</button>
        <button className="btn btn-primary" onClick={()=>{limpiarCliente();setResp('');setCondiciones('');setEstados(modulos.map(m=>Array(m.items.length).fill(null)));setObsMod(Array(modulos.length).fill(''));setNcs(modulos.map(m=>Array(m.items.length).fill(null)));setGuardado(false);setAuditGuardada(null);}}>Nueva auditoria</button>
      </div>
      <h2 style={{color:'#1B4F72',marginBottom:12}}>Subir evidencias generales</h2>
      {auditGuardada&&<SubirFotos auditoriaId={auditGuardada.id}/>}
    </div>
  );

  const {puntaje,cumple,noCumple}=calcular();
  return(
    <div>
      {error&&<div className="alert error">{error}</div>}
      <div className="card">
        <h2>Establecimiento auditado</h2>
        <div className="cliente-selector">
          <h3>📋 Seleccionar cliente registrado</h3>
          {cargandoClientes&&<p style={{fontSize:13,color:'#999'}}>Cargando clientes...</p>}
          {!cargandoClientes&&clientes.length===0&&<p style={{fontSize:13,color:'#999'}}>No hay clientes registrados. Completa los datos manualmente abajo.</p>}
          {!cargandoClientes&&clientes.length>0&&(
            <div>
              {clientes.map(c=>(
                <div key={c.id} className={'cliente-card-sel'+(clienteSelId===c.id?' seleccionado':'')} onClick={()=>clienteSelId===c.id?limpiarCliente():seleccionarCliente(c)}>
                  <strong>{c.establecimiento}</strong>
                  {c.rubro&&<span style={{color:'#666',fontSize:12,marginLeft:8}}>· {c.rubro}</span>}
                  {c.domicilio&&<span style={{color:'#999',fontSize:11,marginLeft:8}}>· {c.domicilio}</span>}
                  {clienteSelId===c.id&&<span style={{float:'right',color:'#1E8449',fontSize:12,fontWeight:'bold'}}>✓ Seleccionado</span>}
                </div>
              ))}
              {clienteSelId&&<button className="btn" style={{background:'#ECF0F1',color:'#555',fontSize:12,marginTop:6}} onClick={limpiarCliente}>✕ Quitar seleccion</button>}
            </div>
          )}
        </div>
        <label>Establecimiento / Razon social *</label>
        <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Nombre del establecimiento"/>
        <label>Domicilio</label>
        <input value={domicilio} onChange={e=>setDomicilio(e.target.value)} placeholder="Direccion"/>
        <label>N de habilitacion</label>
        <input value={nroHab} onChange={e=>setNroHab(e.target.value)} placeholder="Numero de habilitacion municipal"/>
        <label>Rubro / Actividad</label>
        <input value={rubro} onChange={e=>setRubro(e.target.value)} placeholder="Ej: Panaderia, Restaurante..."/>
        <label>Responsable presente</label>
        <input value={resp} onChange={e=>setResp(e.target.value)} placeholder="Nombre y apellido"/>
        <label>Fecha de auditoria</label>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        <label>Condiciones generales al inicio</label>
        <textarea rows={2} value={condiciones} onChange={e=>setCondiciones(e.target.value)} placeholder="Descripcion de las condiciones al inicio"/>
      </div>
      {modulos.map((mod,mi)=>(
        <ModuloChecklist key={mi} moduloIdx={mi} modulo={mod} estados={estados[mi]} obsMod={obsMod[mi]} ncsModulo={ncs[mi]}
          onEstado={(idx,val)=>setEstado(mi,idx,val)} onObsMod={val=>setObsModulo(mi,val)} onNcChange={(idx,val)=>setNcData(mi,idx,val)}/>
      ))}
      <div className="card">
        <h2>Resumen</h2>
        <div className="grid4" style={{marginBottom:16}}>
          <div className="stat"><div className="num" style={{color:'#1E8449'}}>{cumple}</div><div className="label">Cumplen</div></div>
          <div className="stat"><div className="num" style={{color:'#C0392B'}}>{noCumple}</div><div className="label">No cumplen</div></div>
          <div className="stat"><div className="num">{puntaje}%</div><div className="label">Puntaje</div></div>
          <div className="stat"><span className={'badge '+(puntaje>=80?'verde':'rojo')} style={{fontSize:14,padding:'6px 12px',marginTop:8,display:'inline-block'}}>{puntaje>=80?'APROBADO':'NO APROBADO'}</span></div>
        </div>
        {ncSinGestionar>0&&<div className="alert warning" style={{marginBottom:12}}>Tenes {ncSinGestionar} NC sin accion correctiva.</div>}
        {ncTotal>0&&<div className="alert info" style={{marginBottom:12}}>{ncTotal} accion(es) correctiva(s) registrada(s).</div>}
        <button className="btn btn-success" onClick={guardar} disabled={guardando}>
          {guardando&&<span className="spinner"></span>}{guardando?'Guardando...':'Guardar auditoria'}
        </button>
      </div>
    </div>
  );
}

function Dashboard({auditorias,cargando,onEliminar,onVerDetalle}){
  const total=auditorias.length;const aprobadas=auditorias.filter(a=>a.resultado==='Aprobado').length;
  const conNC=auditorias.filter(a=>(a.modulos?.resumen?.noCumple||0)>0).length;
  const promedio=total>0?Math.round(auditorias.reduce((s,a)=>s+(a.puntaje||0),0)/total):0;
  return(
    <div>
      <div className="grid2" style={{marginBottom:16}}>
        <div className="stat"><div className="num">{total}</div><div className="label">Auditorias realizadas</div></div>
        <div className="stat"><div className="num">{aprobadas}</div><div className="label">Aprobados</div></div>
        <div className="stat"><div className="num">{conNC}</div><div className="label">Con no conformidades</div></div>
        <div className="stat"><div className="num">{promedio}%</div><div className="label">Puntaje promedio</div></div>
      </div>
      <div className="card">
        <h2>Ultimas auditorias</h2>
        {cargando&&<p style={{color:'#999',fontSize:14}}>Cargando...</p>}
        {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorias registradas.</p>}
        {!cargando&&auditorias.length>0&&
          <table><thead><tr><th>Establecimiento</th><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th><th>Ver / PDF</th><th>Eliminar</th></tr></thead>
          <tbody>{auditorias.map((a,i)=>{
            const ncsCount=(a.modulos?.no_conformidades||[]).filter(nc=>nc&&nc.accion_correctiva).length;
            const totalNC=a.modulos?.resumen?.noCumple||0;
            return(<tr key={i}>
              <td>{a.establecimiento}{a.cliente_id&&<span style={{marginLeft:4,fontSize:10,background:'#D5F5E3',color:'#1E8449',borderRadius:3,padding:'1px 5px'}}>vinc.</span>}</td>
              <td>{a.fecha}</td><td>{a.puntaje}%</td>
              <td><span className={'badge '+(a.resultado==='Aprobado'?'verde':'rojo')}>{a.resultado}</span></td>
              <td>{totalNC>0?<span><span className="badge rojo">{totalNC} NC</span>{ncsCount>0&&<span className="badge azul" style={{marginLeft:4}}>{ncsCount} gest.</span>}</span>:<span style={{color:'#aaa',fontSize:12}}>—</span>}</td>
              <td>
                <div style={{display:'flex',gap:4'}}>
                  <button className="btn btn-primary" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onVerDetalle(a)}>Ver</button>
                  <button className="btn btn-pdf" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>generarPDF(a)}>PDF</button>
                </div>
              </td>
              <td><button className="btn btn-danger" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onEliminar(a)}>🗑</button></td>
            </tr>);
          })}</tbody></table>}
      </div>
    </div>
  );
}

function GestionClientes(){
  const [clientes,setClientes]=useState([]);const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [estab,setEstab]=useState('');const [domicilio,setDomicilio]=useState('');const [nroHab,setNroHab]=useState('');const [rubro,setRubro]=useState('');
  const [cargando,setCargando]=useState(false);const [msg,setMsg]=useState('');const [error,setError]=useState('');
  useEffect(()=>{cargarClientes();},[]);
  const cargarClientes=async()=>{
    const {data}=await supabase.from('clientes').select('*').order('created_at',{ascending:false});
    if(data)setClientes(data);
  };
  const crearCliente=async()=>{
    if(!email||!pass||!estab){setError('Completa al menos establecimiento, email y contrasena');return;}
    if(pass.length<6){setError('La contrasena debe tener al menos 6 caracteres');return;}
    setCargando(true);setError('');setMsg('');
    const {data,error:e}=await supabase.auth.signUp({email,password:pass});
    if(e){setError('Error: '+e.message);setCargando(false);return;}
    if(!data.user){setError('No se pudo crear el usuario. Puede que el email ya exista.');setCargando(false);return;}
    await supabase.from('clientes').insert([{user_id:data.user.id,establecimiento:estab,email,domicilio,nro_habilitacion:nroHab,rubro}]);
    setMsg('Cliente "'+estab+'" creado. Email: '+email+' / Contrasena: '+pass);
    setEmail('');setPass('');setEstab('');setDomicilio('');setNroHab('');setRubro('');
    cargarClientes();setCargando(false);
  };
  const eliminarCliente=async(c)=>{
    if(!confirm('Eliminar acceso de "'+c.establecimiento+'"?'))return;
    await supabase.from('clientes').delete().eq('id',c.id);
    cargarClientes();
  };
  return(
    <div>
      <div className="card">
        <h2>Nuevo cliente</h2>
        {error&&<div className="alert error">{error}</div>}
        {msg&&<div className="alert success">{msg}</div>}
        <div className="grid2">
          <div><label>Nombre del establecimiento *</label><input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panaderia San Martin"/></div>
          <div><label>Rubro / Actividad</label><input value={rubro} onChange={e=>setRubro(e.target.value)} placeholder="Ej: Restaurante..."/></div>
        </div>
        <label>Domicilio del establecimiento</label>
        <input value={domicilio} onChange={e=>setDomicilio(e.target.value)} placeholder="Direccion completa"/>
        <label>N de habilitacion municipal</label>
        <input value={nroHab} onChange={e=>setNroHab(e.target.value)} placeholder="Numero de habilitacion"/>
        <label>Email del cliente *</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="cliente@email.com"/>
        <label>Contrasena inicial (minimo 6 caracteres) *</label>
        <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Contrasena para el cliente"/>
        <p style={{fontSize:11,color:'#999',marginBottom:8}}>Los datos se usaran para autocompletar nuevas auditorias.</p>
        <button className="btn btn-success" onClick={crearCliente} disabled={cargando}>
          {cargando&&<span className="spinner"></span>}{cargando?'Creando...':'Crear acceso'}
        </button>
      </div>
      <div className="card">
        <h2>Clientes con acceso</h2>
        {clientes.length===0&&<p style={{color:'#999',fontSize:14}}>No hay clientes registrados.</p>}
        {clientes.length>0&&(
          <table><thead><tr><th>Establecimiento</th><th>Rubro</th><th>Email</th><th>Hab.</th><th>Creado</th><th>Accion</th></tr></thead>
          <tbody>{clientes.map((c,i)=>(
            <tr key={i}>
              <td>{c.establecimiento}</td>
              <td>{c.rubro||<span style={{color:'#aaa'}}>—</span>}</td>
              <td>{c.email}</td>
              <td style={{fontSize:12}}>{c.nro_habilitacion||<span style={{color:'#aaa'}}>—</span>}</td>
              <td>{new Date(c.created_at).toLocaleDateString('es-AR')}</td>
              <td><button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>eliminarCliente(c)}>Eliminar</button></td>
            </tr>
          ))}</tbody></table>
        )}
      </div>
    </div>
  );
}

function VistaCliente({session,onLogout}){
  const {cliente}=session;
  const [auditorias,setAuditorias]=useState([]);
  const [auditoriaDetalle,setAuditoriaDetalle]=useState(null);
  const [seleccionada,setSeleccionada]=useState(null);
  const [cargando,setCargando]=useState(true);
  const [tabCliente,setTabCliente]=useState('auditorias');
  const [ncExpandida,setNcExpandida]=useState(null);
  const [actualizando,setActualizando]=useState(false);
  const [msgNC,setMsgNC]=useState('');

  useEffect(()=>{(async()=>{
    if(cliente.id){
      const {data:dataId}=await supabase.from('auditorias').select('*').eq('cliente_id',cliente.id).order('created_at',{ascending:false});
      if(dataId&&dataId.length>0){setAuditorias(dataId);setCargando(false);return;}
    }
    const {data}=await supabase.from('auditorias').select('*').ilike('establecimiento','%'+cliente.establecimiento+'%').order('created_at',{ascending:false});
    if(data)setAuditorias(data);
    setCargando(false);
  })();},[]);

  const todasLasNCs=auditorias.flatMap(a=>{
    const ncs=a.modulos?.no_conformidades||[];
    return ncs.filter(nc=>nc&&nc.accion_correctiva).map((nc,i)=>({...nc,auditoria_id:a.id,auditoria_fecha:a.fecha,nc_index:i}));
  });

  const marcarEnProceso=async(auditoriaId,ncIndex)=>{
    setActualizando(true);setMsgNC('');
    const audit=auditorias.find(a=>a.id===auditoriaId);
    if(!audit){setActualizando(false);return;}
    const ncs=[...(audit.modulos?.no_conformidades||[])];
    if(ncs[ncIndex])ncs[ncIndex]={...ncs[ncIndex],estado:'En proceso'};
    const nuevosMod={...audit.modulos,no_conformidades:ncs};
    const {error}=await supabase.from('auditorias').update({modulos:nuevosMod}).eq('id',auditoriaId);
    if(!error){setAuditorias(prev=>prev.map(a=>a.id===auditoriaId?{...a,modulos:nuevosMod}:a));setMsgNC('Estado actualizado a "En proceso".');}
    setActualizando(false);
  };

  const colorEstadoNC=(estado)=>{
    if(estado==='Cerrada')return{bg:'#D5F5E3',color:'#1E8449'};
    if(estado==='Verificada')return{bg:'#D6EAF8',color:'#1B4F72'};
    if(estado==='En proceso')return{bg:'#FEF9E7',color:'#9A7D0A'};
    return{bg:'#FADBD8',color:'#C0392B'};
  };

  if(auditoriaDetalle){
    return(
      <div>
        <div className="header">
          <div><h1>{cliente.establecimiento}</h1><span>Portal del cliente — INOCUA tec BPM</span></div>
          <button className="btn btn-danger" style={{marginLeft:'auto'}} onClick={onLogout}>Salir</button>
        </div>
        <div className="container">
          <DetalleAuditoria auditoria={auditoriaDetalle} onVolver={()=>setAuditoriaDetalle(null)} esCliente={true}/>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="header">
        <div><h1>{cliente.establecimiento}</h1><span>Portal del cliente — INOCUA tec BPM</span></div>
        <button className="btn btn-danger" style={{marginLeft:'auto'}} onClick={onLogout}>Salir</button>
      </div>
      <div className="nav">
        <button className={tabCliente==='auditorias'?'active':''} onClick={()=>{setTabCliente('auditorias');setSeleccionada(null);}}>📋 Mis auditorias</button>
        <button className={tabCliente==='ncs'?'active':''} onClick={()=>{setTabCliente('ncs');setSeleccionada(null);}}>
          ⚠️ No conformidades{todasLasNCs.filter(nc=>nc.estado==='Pendiente').length>0&&<span style={{background:'#C0392B',color:'white',borderRadius:10,padding:'1px 6px',fontSize:11,marginLeft:6}}>{todasLasNCs.filter(nc=>nc.estado==='Pendiente').length}</span>}
        </button>
      </div>
      <div className="container">
        {cargando&&<div className="card"><p style={{color:'#999',fontSize:14}}>Cargando...</p></div>}

        {!cargando&&tabCliente==='auditorias'&&!seleccionada&&(
          <div className="card">
            <h2>Mis auditorias</h2>
            {auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorias registradas.</p>}
            {auditorias.length>0&&(
              <table><thead><tr><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th><th>Ver</th><th>PDF</th><th>Fotos</th></tr></thead>
              <tbody>{auditorias.map((a,i)=>{
                const ncsTotal=a.modulos?.resumen?.noCumple||0;
                const ncsPend=(a.modulos?.no_conformidades||[]).filter(nc=>nc&&nc.estado==='Pendiente').length;
                return(<tr key={i}>
                  <td>{a.fecha}</td>
                  <td>{a.puntaje}%</td>
                  <td><span className={'badge '+(a.resultado==='Aprobado'?'verde':'rojo')}>{a.resultado}</span></td>
                  <td>{ncsTotal>0?<span><span className="badge rojo">{ncsTotal} NC</span>{ncsPend>0&&<span className="badge amarillo" style={{marginLeft:4}}>{ncsPend} pend.</span>}</span>:<span style={{color:'#aaa',fontSize:12}}>—</span>}</td>
                  <td><button className="btn btn-primary" style={{fontSize:12,padding:'4px 8px'}} onClick={()=>setAuditoriaDetalle(a)}>Ver</button></td>
                  <td><button className="btn btn-pdf" style={{fontSize:12,padding:'4px 8px'}} onClick={()=>generarPDF(a)}>PDF</button></td>
                  <td><button className="btn btn-warning" style={{fontSize:12,padding:'4px 8px'}} onClick={()=>setSeleccionada(a)}>Fotos</button></td>
                </tr>);
              })}</tbody></table>
            )}
          </div>
        )}

        {!cargando&&tabCliente==='auditorias'&&seleccionada&&(
          <div className="card">
            <button className="btn btn-primary" style={{marginBottom:16,fontSize:12}} onClick={()=>setSeleccionada(null)}>← Volver</button>
            <h2>Evidencias — {seleccionada.fecha}</h2>
            <SubirFotos auditoriaId={seleccionada.id}/>
          </div>
        )}

        {!cargando&&tabCliente==='ncs'&&(
          <div>
            {msgNC&&<div className="alert success">{msgNC}</div>}
            {todasLasNCs.length===0&&<div className="card"><p style={{color:'#999',fontSize:14}}>No hay no conformidades registradas.</p></div>}
            {todasLasNCs.length>0&&(
              <div>
                <div className="alert info" style={{marginBottom:16}}>
                  Tenes <strong>{todasLasNCs.filter(nc=>nc.estado==='Pendiente').length} NC pendientes</strong> de un total de {todasLasNCs.length}.
                </div>
                {todasLasNCs.map((nc,idx)=>{
                  const col=colorEstadoNC(nc.estado);
                  const esExpandida=ncExpandida===idx;
                  return(
                    <div key={idx} className="nc-cliente-card" style={{borderColor:col.color+'55'}}>
                      <h4 style={{color:col.color,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setNcExpandida(esExpandida?null:idx)}>
                        <span>NC {idx+1} — {nc.modulo}</span>
                        <span style={{fontSize:11,background:col.bg,color:col.color,border:'1px solid '+col.color,borderRadius:10,padding:'2px 8px'}}>{nc.estado||'Pendiente'}</span>
                      </h4>
                      <div className="nc-cliente-detalle"><strong>Item:</strong> {nc.item}<br/><strong>Fecha:</strong> {nc.auditoria_fecha}</div>
                      {!esExpandida&&<button className="btn" style={{background:'#EBF5FB',color:'#1B4F72',fontSize:12,padding:'4px 10px'}} onClick={()=>setNcExpandida(idx)}>Ver detalle</button>}
                      {esExpandida&&(
                        <div>
                          <div className="nc-cliente-detalle" style={{background:'#fff',border:'1px solid #eee',borderRadius:4,padding:10,marginBottom:8}}>
                            <p><strong>Accion correctiva:</strong><br/>{nc.accion_correctiva}</p>
                            {nc.accion_preventiva&&<p style={{marginTop:6}}><strong>Accion preventiva:</strong><br/>{nc.accion_preventiva}</p>}
                            <p style={{marginTop:6}}><strong>Responsable:</strong> {nc.responsable||'—'} | <strong>Plazo:</strong> {nc.plazo||'—'}</p>
                          </div>
                          <div className="nc-acciones-cliente">
                            {nc.estado==='Pendiente'&&(
                              <button className="btn btn-warning" style={{fontSize:12}} onClick={()=>marcarEnProceso(nc.auditoria_id,nc.nc_index)} disabled={actualizando}>
                                {actualizando&&<span className="spinner"></span>}🟡 Marcar En proceso
                              </button>
                            )}
                            <button className="btn" style={{background:'#EBF5FB',color:'#1B4F72',fontSize:12}} onClick={()=>setNcExpandida(null)}>Cerrar</button>
                          </div>
                          <div style={{marginTop:12}}>
                            <p style={{fontSize:12,color:'#555',marginBottom:6,fontWeight:'bold'}}>Subir evidencias para esta NC:</p>
                            <SubirFotos auditoriaId={nc.auditoria_id} ncIndex={nc.nc_index}/>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [session,setSession]=useState(null);const [tab,setTab]=useState('dashboard');
  const [auditorias,setAuditorias]=useState([]);const [cargando,setCargando]=useState(true);
  const [auditoriaDetalle,setAuditoriaDetalle]=useState(null);
  const [modulos,setModulos]=useState(()=>cargarModulos());

  useEffect(()=>{
    supabase.auth.getSession().then(async({data})=>{
      if(data.session){
        const u=data.session.user;
        const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',u.id).maybeSingle();
        if(cliente)setSession({tipo:'cliente',user:u,cliente});
        else{setSession({tipo:'auditor',user:u});cargarAuditorias();}
      } else setCargando(false);
    });
  },[]);

  const cargarAuditorias=async()=>{
    setCargando(true);const {data}=await supabase.from('auditorias').select('*').order('created_at',{ascending:false});
    if(data)setAuditorias(data);setCargando(false);
  };
  const eliminarAuditoria=async(a)=>{
    if(!confirm('Eliminar auditoria de "'+a.establecimiento+'" del '+a.fecha+'?'))return;
    await supabase.from('auditorias').delete().eq('id',a.id);
    setAuditorias(prev=>prev.filter(x=>x.id!==a.id));
  };
  const logout=async()=>{await supabase.auth.signOut();setSession(null);setAuditorias([]);setTab('dashboard');setAuditoriaDetalle(null);setCargando(false);};

  if(!session)return <Login onLogin={async(s)=>{setSession(s);if(s.tipo==='auditor')cargarAuditorias();else setCargando(false);}}/>;
  if(session.tipo==='cliente')return <VistaCliente session={session} onLogout={logout}/>;

  if(auditoriaDetalle){
    return(
      <div>
        <div className="header">
          <div><h1>INOCUA tec Servicios</h1><span>Panel Auditor</span></div>
          <button className="btn btn-danger" style={{marginLeft:'auto',fontSize:12,padding:'4px 10px'}} onClick={logout}>Salir</button>
        </div>
        <div className="nav">
          <button onClick={()=>setAuditoriaDetalle(null)}>← Dashboard</button>
        </div>
        <div className="container">
          <DetalleAuditoria auditoria={auditoriaDetalle} onVolver={()=>setAuditoriaDetalle(null)} esCliente={false}/>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div className="header">
        <div><h1>INOCUA tec Servicios</h1><span>Sistema de Auditorias BPM - Panel Auditor</span></div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:11,opacity:0.7}}>{cargando?'Cargando...':auditorias.length+' auditorias'}</span>
          <button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={logout}>Salir</button>
        </div>
      </div>
      <div className="nav">
        <button className={tab==='dashboard'?'active':''} onClick={()=>setTab('dashboard')}>Dashboard</button>
        <button className={tab==='nueva'?'active':''} onClick={()=>setTab('nueva')}>Nueva auditoria</button>
        <button className={tab==='clientes'?'active':''} onClick={()=>setTab('clientes')}>Clientes</button>
        <button className={tab==='editor'?'active':''} onClick={()=>setTab('editor')}>✏️ Editor checklist</button>
      </div>
      <div className="container">
        {tab==='dashboard'&&<Dashboard auditorias={auditorias} cargando={cargando} onEliminar={eliminarAuditoria} onVerDetalle={a=>setAuditoriaDetalle(a)}/>}
        {tab==='nueva'&&<NuevaAuditoria onGuardar={a=>{setAuditorias(p=>[a,...p]);}} modulos={modulos}/>}
        {tab==='clientes'&&<GestionClientes/>}
        {tab==='editor'&&(
          <div className="card">
            <h2>✏️ Editor de modulos y criterios</h2>
            <EditorModulos modulos={modulos} onGuardar={mods=>setModulos(mods)}/>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
