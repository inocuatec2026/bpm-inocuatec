body{font-family:Arial,sans-serif;background:#f0f4f8;color:#333}

.btn-danger{background:#C0392B;color:white}

.stat{text-align:center;padding:16px;background:#D6EAF8;border-radius:8px}
.stat .num{font-size:32px;font-weight:bold;color:#1B4F72}

table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#1B4F72;color:white;padding:10px;text-align:left}
td{padding:10px;border-bottom:1px solid #eee}
tr:hover td{background:#f8f9fa}

label{font-size:13px;color:#555;display:block;margin-bottom:4px}

// ── LOGIN ──────────────────────────────────────────────────
function Login({onLogin}){
  const [modo,setModo]=useState('auditor');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [cargando,setCargando]=useState(false);
  const [error,setError]=useState('');

  const loginAuditor=async()=>{
    if(!email||!pass){setError('Completá email y contraseña');return;}
    setCargando(true);setError('');
    const {data,error:e}=await supabase.auth.signInWithPassword({email,password:pass});
    setCargando(false);
    if(e){setError('Email o contraseña incorrectos');return;}
    // Verificar si es auditor (no está en tabla clientes)
    const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',data.user.id).single();
    if(cliente){
      onLogin({tipo:'cliente',user:data.user,cliente});
    } else {
      onLogin({tipo:'auditor',user:data.user});
    }
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <h2>INOCUA°tec</h2>
        <p>Sistema de Auditorías BPM</p>
        {error&&<div className="alert error">{error}</div>}
        <label>Email</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com"/>
        <label>Contraseña</label>
        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
          onKeyDown={e=>e.key==='Enter'&&loginAuditor()}/>
        <button className="btn btn-primary" style={{width:'100%',marginTop:4}} onClick={loginAuditor} disabled={cargando}>
          {cargando&&<span className="spinner"></span>}{cargando?'Ingresando...':'Ingresar'}
        </button>
      </div>
    </div>
  );
}

// ── SUBIR FOTOS ────────────────────────────────────────────
function SubirFotos({auditoriaId}){
  const [fotos,setFotos]=useState([]);
  const [subiendo,setSubiendo]=useState(false);
  const [msg,setMsg]=useState('');
  const inputRef=useRef();

  useEffect(()=>{cargarFotos();},[auditoriaId]);

  const cargarFotos=async()=>{
    const {data}=await supabase.storage.from('evidencias').list(`${auditoriaId}/`);
    if(data){
      const urls=data.map(f=>{
        const {data:u}=supabase.storage.from('evidencias').getPublicUrl(`${auditoriaId}/${f.name}`);
        return{name:f.name,url:u.publicUrl};
      });
      setFotos(urls);
    }
  };

  const subirArchivo=async(e)=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    setSubiendo(true);setMsg('');
    for(const file of files){
      const nombre=`${Date.now()}_${file.name}`;
      await supabase.storage.from('evidencias').upload(`${auditoriaId}/${nombre}`,file);
    }
    setSubiendo(false);
    setMsg(`✅ ${files.length} archivo(s) subido(s)`);
    cargarFotos();
    inputRef.current.value='';
  };

  return(
    <div>
      <div className="upload-area" onClick={()=>inputRef.current.click()}>
        <div style={{fontSize:32}}>📎</div>
        <p>Hacé clic para subir fotos o documentos<br/><small>JPG, PNG, PDF — hasta 50MB</small></p>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={subirArchivo}/>
      </div>
      {subiendo&&<div className="alert info" style={{marginTop:8}}>⏳ Subiendo archivos...</div>}
      {msg&&<div className="alert success" style={{marginTop:8}}>{msg}</div>}
      {fotos.length>0&&(
        <div className="foto-grid">
          {fotos.map((f,i)=>
            f.url.endsWith('.pdf')?
            <a key={i} href={f.url} target="_blank" style={{display:'flex',alignItems:'center',justifyContent:'center',height:80,background:'#f8f9fa',borderRadius:4,border:'2px solid #eee',textDecoration:'none',color:'#C0392B',fontSize:12,fontWeight:'bold'}}>📄 PDF</a>:
            <img key={i} src={f.url} alt={f.name} onClick={()=>window.open(f.url,'_blank')}/>
          )}
        </div>
      )}
      {fotos.length===0&&!subiendo&&<p style={{fontSize:12,color:'#999',marginTop:8}}>No hay evidencias cargadas aún.</p>}
    </div>
  );
}

// ── VISTA CLIENTE ──────────────────────────────────────────

      <div className="container">

            {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorías registradas aún.</p>}
            {!cargando&&auditorias.length>0&&(

              <tbody>{auditorias.map((a,i)=>(

                  <td><span className={`badge ${a.resultado==='Aprobado'?'verde':'rojo'}`}>{a.resultado}</span></td>
                  <td><button className="btn btn-primary" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>setSeleccionada(a)}>📎 Subir evidencia</button></td>

              ))}</tbody></table>

          <div className="card">

            <p style={{fontSize:13,color:'#666',marginBottom:16}}>Subí fotos, actas, análisis de agua, certificados de plagas, lo que necesites.</p>

// ── GESTIÓN DE CLIENTES ────────────────────────────────────
function GestionClientes(){
  const [clientes,setClientes]=useState([]);
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [estab,setEstab]=useState('');
  const [cargando,setCargando]=useState(false);
  const [msg,setMsg]=useState('');
  const [error,setError]=useState('');

  useEffect(()=>{cargarClientes();},[]);

  const cargarClientes=async()=>{
    const {data}=await supabase.from('clientes').select('*').order('created_at',{ascending:false});
    if(data)setClientes(data);
  };

  const crearCliente=async()=>{
    if(!email||!pass||!estab){setError('Completá todos los campos');return;}
    setCargando(true);setError('');setMsg('');
    // Crear usuario en Supabase Auth
    const {data,error:e}=await supabase.auth.admin.createUser({
      email,password:pass,email_confirm:true
    });
    if(e){setError('Error: '+e.message);setCargando(false);return;}
    // Guardar en tabla clientes
    await supabase.from('clientes').insert([{
      user_id:data.user.id,establecimiento:estab,email
    }]);
    setMsg(`✅ Cliente "${estab}" creado. Email: ${email}`);
    setEmail('');setPass('');setEstab('');
    cargarClientes();
    setCargando(false);
  };

  const eliminarCliente=async(c)=>{
    if(!confirm(`¿Eliminar cliente "${c.establecimiento}"? Se eliminará su acceso.`))return;
    await supabase.auth.admin.deleteUser(c.user_id);
    await supabase.from('clientes').delete().eq('id',c.id);
    cargarClientes();
  };

  return(
    <div>
      <div className="card">
        <h2>Nuevo cliente</h2>
        {error&&<div className="alert error">{error}</div>}
        {msg&&<div className="alert success">{msg}</div>}
        <label>Nombre del establecimiento</label>
        <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panadería San Martín"/>
        <label>Email del cliente</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="cliente@email.com"/>
        <label>Contraseña inicial</label>
        <input type="text" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Contraseña que le vas a dar al cliente"/>
        <button className="btn btn-success" onClick={crearCliente} disabled={cargando}>
          {cargando&&<span className="spinner"></span>}{cargando?'Creando...':'➕ Crear cliente'}
        </button>
      </div>
      <div className="card">
        <h2>Clientes activos</h2>
        {clientes.length===0&&<p style={{color:'#999',fontSize:14}}>No hay clientes registrados aún.</p>}
        {clientes.length>0&&(
          <table><thead><tr><th>Establecimiento</th><th>Email</th><th>Creado</th><th>Acción</th></tr></thead>
          <tbody>{clientes.map((c,i)=>(
            <tr key={i}>
              <td>{c.establecimiento}</td>
              <td>{c.email}</td>
              <td>{new Date(c.created_at).toLocaleDateString('es-AR')}</td>
              <td><button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>eliminarCliente(c)}>🗑 Eliminar</button></td>
            </tr>
          ))}</tbody></table>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────
function Dashboard({auditorias,cargando,onVerEvidencias}){
  const total=auditorias.length;
  const aprobadas=auditorias.filter(a=>a.resultado==="Aprobado").length;
  const conNC=auditorias.filter(a=>(a.modulos?.ncs||0)>0).length;
  const promedio=total>0?Math.round(auditorias.reduce((s,a)=>s+(a.puntaje||0),0)/total):0;
  return(
    <div>
      <div className="grid2" style={{marginBottom:16}}>
        <div className="stat"><div className="num">{total}</div><div className="label">Auditorías realizadas</div></div>
        <div className="stat"><div className="num">{aprobadas}</div><div className="label">Establecimientos aprobados</div></div>
        <div className="stat"><div className="num">{conNC}</div><div className="label">Con no conformidades</div></div>
        <div className="stat"><div className="num">{promedio}%</div><div className="label">Puntaje promedio</div></div>
      </div>
      <div className="card">
        <h2>Últimas auditorías</h2>
        {cargando&&<p style={{color:'#999',fontSize:14}}>⏳ Cargando...</p>}
        {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorías registradas aún.</p>}
        {!cargando&&auditorias.length>0&&
          <table><thead><tr><th>Establecimiento</th><th>Responsable</th><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th><th>Evidencias</th></tr></thead>
          <tbody>{auditorias.map((a,i)=>(
            <tr key={i}>
              <td>{a.establecimiento}</td><td>{a.responsable||'—'}</td><td>{a.fecha}</td>
              <td>{a.puntaje}%</td>
              <td><span className={`badge ${a.resultado==='Aprobado'?'verde':'rojo'}`}>{a.resultado}</span></td>
              <td>{a.modulos?.ncs||0}</td>
              <td><button className="btn btn-warning" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onVerEvidencias(a)}>📎 Ver</button></td>
            </tr>
          ))}</tbody></table>}
      </div>
    </div>
  );
}

// ── NUEVA AUDITORÍA ────────────────────────────────────────
function NuevaAuditoria({onGuardar}){
  const [estab,setEstab]=useState('');
  const [resp,setResp]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [respuestas,setRespuestas]=useState({});
  const [obs,setObs]=useState({});
  const [guardando,setGuardando]=useState(false);
  const [guardado,setGuardado]=useState(false);
  const [error,setError]=useState('');
  const [auditGuardada,setAuditGuardada]=useState(null);

  const setR=(i,v)=>setRespuestas(p=>({...p,[i]:v}));
  const setO=(i,v)=>setObs(p=>({...p,[i]:v}));

  const calcular=()=>{
    const respondidos=Object.keys(respuestas).length;
    if(respondidos===0)return{puntaje:0,ncs:0};
    const ok=Object.values(respuestas).filter(v=>v==='C').length;
    const ncs=Object.values(respuestas).filter(v=>v==='NC').length;
    return{puntaje:Math.round((ok/respondidos)*100),ncs};
  };

  const guardar=async()=>{
    if(!estab){alert('Ingresá el nombre del establecimiento');return;}
    setGuardando(true);setError('');
    const {puntaje,ncs}=calcular();
    const resultado=puntaje>=80?'Aprobado':'No aprobado';
    const modulosData={respuestas,observaciones:obs,ncs,
      detalle:MODULOS.map((nombre,mi)=>{
        const cm=CRITERIOS_BASE.filter(c=>c.mod===mi);
        const conformes=cm.filter((_,ci)=>respuestas[`${mi}-${ci}`]==='C').length;
        const total=cm.filter((_,ci)=>respuestas[`${mi}-${ci}`]).length;
        return{nombre,puntaje:total>0?Math.round((conformes/total)*100):null};
      })
    };
    const {data,error:err}=await supabase.from('auditorias').insert([{
      establecimiento:estab,responsable:resp,fecha,puntaje,resultado,modulos:modulosData
    }]).select();
    setGuardando(false);
    if(err){setError('Error: '+err.message);return;}
    setAuditGuardada(data[0]);
    onGuardar(data[0]);
    setGuardado(true);
  };

  if(guardado)return(
    <div className="card">
      <div className="alert success">✅ Auditoría guardada correctamente.</div>
      <p style={{fontSize:13,color:'#666',marginBottom:16}}>Podés subir evidencias ahora mismo:</p>
      {auditGuardada&&<SubirFotos auditoriaId={auditGuardada.id}/>}
      <div style={{marginTop:16}}>
        <button className="btn btn-primary" onClick={()=>{setEstab('');setResp('');setRespuestas({});setObs({});setGuardado(false);setAuditGuardada(null);}}>Nueva auditoría</button>
      </div>
    </div>
  );

  const {puntaje,ncs}=calcular();
  return(
    <div>
      {error&&<div className="alert error">{error}</div>}
      <div className="card">
        <h2>Datos del establecimiento</h2>
        <label>Nombre del establecimiento *</label>
        <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panadería San Martín"/>
        <label>Responsable / Titular</label>
        <input value={resp} onChange={e=>setResp(e.target.value)} placeholder="Nombre completo"/>
        <label>Fecha de auditoría</label>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
      </div>
      {MODULOS.map((mod,mi)=>(
        <div className="card" key={mi}>
          <h2>{mi+1}. {mod}</h2>
          {CRITERIOS_BASE.filter(c=>c.mod===mi).map((c,ci)=>{
            const idx=`${mi}-${ci}`;
            return(
              <div key={idx} style={{marginBottom:16,paddingBottom:16,borderBottom:'1px solid #eee'}}>
                <p style={{fontSize:14,marginBottom:8}}>{c.texto}</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  {['C','NC','NA'].map(v=>(
                    <button key={v} className="btn" onClick={()=>setR(idx,v)}
                      style={{background:respuestas[idx]===v?(v==='C'?'#1E8449':v==='NC'?'#C0392B':'#888'):'#eee',
                        color:respuestas[idx]===v?'white':'#333',flex:1}}>
                      {v==='C'?'✅ Conforme':v==='NC'?'❌ No conforme':'— N/A'}
                    </button>
                  ))}
                </div>
                {respuestas[idx]==='NC'&&(
                  <textarea rows={2} placeholder="Observación / acción correctiva..." value={obs[idx]||''} onChange={e=>setO(idx,e.target.value)}/>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div className="card">
        <h2>Resumen</h2>
        <div className="grid2">
          <div className="stat"><div className="num">{puntaje}%</div><div className="label">Puntaje</div></div>
          <div className="stat"><div className="num">{ncs}</div><div className="label">No conformidades</div></div>
        </div>
        <div style={{marginTop:16}}>
          <span className={`badge ${puntaje>=80?'verde':'rojo'}`} style={{fontSize:14,padding:'6px 16px'}}>
            {puntaje>=80?'✅ APROBADO':'❌ NO APROBADO'}
          </span>
        </div>
        <div style={{marginTop:16}}>
          <button className="btn btn-success" onClick={guardar} disabled={guardando}>
            {guardando&&<span className="spinner"></span>}
            {guardando?'Guardando...':'💾 Guardar auditoría'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [auditorias,setAuditorias]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [auditoriaEvidencia,setAuditoriaEvidencia]=useState(null);

  useEffect(()=>{
    supabase.auth.getSession().then(async({data})=>{
      if(data.session){
        const u=data.session.user;
        const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',u.id).single();
        if(cliente) setSession({tipo:'cliente',user:u,cliente});
        else{setSession({tipo:'auditor',user:u});cargarAuditorias();}
      } else setCargando(false);
    });
  },[]);

  const cargarAuditorias=async()=>{
    setCargando(true);
    const {data}=await supabase.from('auditorias').select('*').order('created_at',{ascending:false});
    if(data)setAuditorias(data);
    setCargando(false);
  };

  const logout=async()=>{
    await supabase.auth.signOut();
    setSession(null);setAuditorias([]);setTab('dashboard');setCargando(false);
  };

  if(!session)return <Login onLogin={async(s)=>{
    setSession(s);
    if(s.tipo==='auditor')cargarAuditorias();
    else setCargando(false);
  }}/>;

  if(session.tipo==='cliente')return <VistaCliente session={session} onLogout={logout}/>;

  return(
    <div>
      <div className="header">
        <div><h1>INOCUA°tec Servicios</h1><span>Sistema de Auditorías BPM — Panel Auditor</span></div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:11,opacity:0.7}}>{cargando?'⏳':'✅ '+auditorias.length+' auditorías'}</span>
          <button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={logout}>Salir</button>
        </div>
      </div>
      <div className="nav">
        <button className={tab==='dashboard'?'active':''} onClick={()=>{setTab('dashboard');setAuditoriaEvidencia(null);}}>📊 Dashboard</button>
        <button className={tab==='nueva'?'active':''} onClick={()=>{setTab('nueva');setAuditoriaEvidencia(null);}}>➕ Nueva auditoría</button>
        <button className={tab==='clientes'?'active':''} onClick={()=>{setTab('clientes');setAuditoriaEvidencia(null);}}>👥 Clientes</button>
      </div>
      <div className="container">
        {tab==='dashboard'&&!auditoriaEvidencia&&<Dashboard auditorias={auditorias} cargando={cargando} onVerEvidencias={a=>setAuditoriaEvidencia(a)}/>}
        {tab==='dashboard'&&auditoriaEvidencia&&(
          <div className="card">
            <button className="btn btn-primary" style={{marginBottom:16,fontSize:12}} onClick={()=>setAuditoriaEvidencia(null)}>← Volver</button>
            <h2>Evidencias — {auditoriaEvidencia.establecimiento} ({auditoriaEvidencia.fecha})</h2>
            <SubirFotos auditoriaId={auditoriaEvidencia.id}/>
          </div>
        )}
        {tab==='nueva'&&<NuevaAuditoria onGuardar={a=>{setAuditorias(p=>[a,...p]);}}/>}
        {tab==='clientes'&&<GestionClientes/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
