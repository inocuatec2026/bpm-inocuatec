            </div>
            <div className="nc-campo"><label>Plazo</label>
              <select value={ncData.plazo} onChange={e=>onChange({...ncData,plazo:e.target.value})}>

              </select>

          </div>
          <div className="nc-campo"><label>Estado</label>
            <div className="nc-estado-btns">
              {[['Pendiente','pendiente','🔴'],['En proceso','enproceso','🟡'],['Verificada','verificada','🔵'],['Cerrada','cerrada','🟢']].map(([lbl,cls,ico])=>(
                <button key={cls} className={'nc-estado-btn'+(ncData.estado===lbl?' activo-'+cls:'')} onClick={()=>onChange({...ncData,estado:lbl})}>{ico} {lbl}</button>
              ))}
            </div>
          </div>
          <div style={{marginTop:8,display:'flex',gap:8}}>
            <button className="btn btn-ia" onClick={generar} style={{fontSize:11}}>Regenerar sugerencia</button>

      )}

  );

function generarPDF(auditoria){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,M=15,TW=W-M*2;let y=15;
  const checkPage=()=>{if(y>270){doc.addPage();y=20;}};
  const escribirBloque=(etiqueta,texto,xEtiq,xTexto,anchoTexto)=>{
    const lines=doc.splitTextToSize(String(texto||''),anchoTexto);
    checkPage();
    doc.setFont('helvetica','bold');doc.text(etiqueta,xEtiq,y);
    doc.setFont('helvetica','normal');
    lines.forEach((l,li)=>{if(li>0)checkPage();doc.text(l,xTexto,y+li*4.5);});
    y+=lines.length*4.5+1;
  };
  doc.setFillColor(27,79,114);doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont('helvetica','bold');
  doc.text('INOCUA tec Servicios',M,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('Planilla de Relevamiento BPM - Modalidad A',M,19);
  doc.text('Cesar Orlando Alvarez Aguilar - Tec. Higiene y Seguridad Alimentaria',M,25);
  y=35;
  const mod=auditoria.modulos||{};
  doc.setFillColor(214,234,248);doc.rect(M,y-5,TW,36,'F');
  doc.setTextColor(27,79,114);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text('DATOS DEL ESTABLECIMIENTO',M+2,y);y+=7;
  const campos=[['Establecimiento:',auditoria.establecimiento||'---'],['Responsable:',auditoria.responsable||'---'],['Fecha:',auditoria.fecha||'---'],['Rubro:',mod.rubro||'---'],['Domicilio:',mod.domicilio||'---'],['N Habilitacion:',mod.nroHab||'---']];
  doc.setTextColor(0,0,0);doc.setFontSize(9);
  campos.forEach(([k,v],i)=>{
    const col=i%2===0?M+2:M+97;const row=Math.floor(i/2);
    doc.setFont('helvetica','bold');doc.text(k,col,y+row*7);
    doc.setFont('helvetica','normal');doc.text(String(v).substring(0,38),col+32,y+row*7);
  });
  y+=26;
  if(mod.condiciones){
    checkPage();doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(80,80,80);
    const cLines=doc.splitTextToSize('Condiciones al inicio: '+String(mod.condiciones),TW-4);
    cLines.forEach(l=>{checkPage();doc.text(l,M+2,y);y+=4.5;});
  }
  y+=4;
  const estados=mod.estados||[];const obsMods=mod.observaciones_modulos||[];
  MODULOS.forEach((modulo,mi)=>{
    const estMod=estados[mi]||[];
    const cumple=estMod.filter(e=>e==='C').length;const nc=estMod.filter(e=>e==='NC').length;const na=estMod.filter(e=>e==='NA').length;
    const total=cumple+nc;const pMod=total>0?Math.round((cumple/total)*100):0;
    checkPage();
    doc.setFillColor(21,67,96);doc.rect(M,y-4,TW,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('MODULO '+String(mi+1)+' - '+modulo.nombre.toUpperCase(),M+2,y+1);
    doc.text('[C]'+String(cumple)+' [NC]'+String(nc)+' [NA]'+String(na)+' | '+String(pMod)+'%',W-M-35,y+1);
    y+=10;
    modulo.items.forEach((item,ii)=>{
      checkPage();
      const est=estMod[ii];const tag=est==='C'?'[C] ':est==='NC'?'[NC]':est==='NA'?'[NA]':'[--]';
      const color=est==='C'?[30,132,73]:est==='NC'?[192,57,43]:[100,100,100];
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...color);doc.text(tag,M+2,y);
      doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
      const lines=doc.splitTextToSize(item,TW-16);
      lines.forEach((l,li)=>{checkPage();doc.text(l,M+14,y+li*4);});
      y+=lines.length*4+2;
    });
    if(obsMods[mi]&&obsMods[mi].trim()){
      checkPage();doc.setFillColor(255,253,231);
      const obsLines=doc.splitTextToSize('Obs: '+obsMods[mi],TW-6);
      const obsH=obsLines.length*4.5+4;
      doc.rect(M,y-2,TW,obsH,'F');
      doc.setFontSize(7.5);doc.setFont('helvetica','italic');doc.setTextColor(100,80,0);
      obsLines.forEach((l,li)=>{checkPage();doc.text(l,M+3,y+1+li*4.5);});
      y+=obsH+3;
    }
    y+=4;
  });
  checkPage();y+=4;
  doc.setFillColor(27,79,114);doc.rect(M,y-4,TW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text('RESUMEN EJECUTIVO DE CUMPLIMIENTO',M+2,y+1);y+=12;
  const resumen=mod.resumen||{};const puntaje=auditoria.puntaje||0;const resultado=auditoria.resultado||'---';
  doc.setFillColor(214,234,248);doc.rect(M,y-4,TW,12,'F');
  doc.setTextColor(0,0,0);doc.setFontSize(10);
  [['Cumplen: '+(resumen.cumple||0),M+5],['No cumplen: '+(resumen.noCumple||0),M+55],['Puntaje: '+puntaje+'%',M+110],['Resultado: '+resultado,M+148]].forEach(([txt,x])=>{
    doc.setFont('helvetica','bold');
    const esR=txt.includes('Resultado');
    if(esR&&resultado==='Aprobado')doc.setTextColor(30,132,73);
    else if(esR)doc.setTextColor(192,57,43);
    else doc.setTextColor(0,0,0);
    doc.text(txt,x,y+3);
  });
  y+=16;
  checkPage();doc.setFontSize(8);doc.setTextColor(0,0,0);
  doc.setFillColor(214,234,248);doc.rect(M,y-3,TW,7,'F');doc.setFont('helvetica','bold');
  doc.text('Modulo',M+2,y+1);doc.text('Cumplen',M+100,y+1);doc.text('No cumplen',M+120,y+1);doc.text('N/A',M+143,y+1);doc.text('%',M+158,y+1);y+=8;
  MODULOS.forEach((modulo,mi)=>{
    checkPage();const estMod=estados[mi]||[];
    const c=estMod.filter(e=>e==='C').length;const nc=estMod.filter(e=>e==='NC').length;const na=estMod.filter(e=>e==='NA').length;
    const t=c+nc;const p=t>0?Math.round((c/t)*100):0;
    if(mi%2===0){doc.setFillColor(248,249,250);doc.rect(M,y-3,TW,7,'F');}
    doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
    doc.text(String(mi+1)+'. '+modulo.nombre,M+2,y+1);
    doc.text(String(c),M+107,y+1);doc.text(String(nc),M+130,y+1);doc.text(String(na),M+147,y+1);
    doc.setFont('helvetica','bold');doc.setTextColor(p>=80?30:192,p>=80?132:57,p>=80?73:43);
    doc.text(String(p)+'%',M+158,y+1);doc.setTextColor(0,0,0);y+=7;
  });
  const ncsConData=(mod.no_conformidades||[]).filter(nc=>nc&&nc.accion_correctiva);
  y+=10;checkPage();
  doc.setFillColor(192,57,43);doc.rect(M,y-4,TW,8,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.setFont('helvetica','bold');
  doc.text('REGISTRO DE NO CONFORMIDADES Y ACCIONES CORRECTIVAS',M+2,y+1);y+=12;
  if(ncsConData.length>0){
    ncsConData.forEach((nc,idx)=>{
      checkPage();
      doc.setFillColor(253,237,237);doc.rect(M,y-3,TW,7,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
      const tituloLines=doc.splitTextToSize('NC '+String(idx+1)+' | '+nc.modulo+' - '+nc.item,TW-4);
      tituloLines.forEach((l,li)=>{checkPage();doc.text(l,M+2,y+li*4.5);});
      y+=tituloLines.length*4.5+3;
      doc.setTextColor(0,0,0);
      escribirBloque('Correctiva:',nc.accion_correctiva,M+2,M+27,TW-30);
      if(nc.accion_preventiva)escribirBloque('Preventiva:',nc.accion_preventiva,M+2,M+27,TW-30);
      checkPage();
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);
      doc.text('Responsable:',M+2,y);doc.setFont('helvetica','normal');doc.text(String(nc.responsable||'---'),M+27,y);
      doc.setFont('helvetica','bold');doc.text('Plazo:',M+95,y);doc.setFont('helvetica','normal');doc.text(String(nc.plazo||'---'),M+108,y);
      doc.setFont('helvetica','bold');doc.text('Estado:',M+140,y);doc.setFont('helvetica','normal');doc.text(String(nc.estado||'Pendiente'),M+155,y);
      y+=8;
      doc.setDrawColor(220,220,220);doc.line(M,y-2,W-M,y-2);y+=3;
    });
  } else {
    doc.setFillColor(248,249,250);doc.rect(M,y-3,TW,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);
    doc.text('Item / No Conformidad',M+2,y+1);doc.text('Accion Correctiva',M+65,y+1);doc.text('Responsable',M+125,y+1);doc.text('Plazo',M+155,y+1);y+=8;
    for(let i=0;i<4;i++){checkPage();doc.setDrawColor(200,200,200);doc.line(M,y,W-M,y);y+=8;}
  }
  y+=15;checkPage();
  doc.setDrawColor(100,100,100);doc.line(M,y,M+75,y);doc.line(M+105,y,W-M,y);y+=5;
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(0,0,0);
  doc.text('Cesar Orlando Alvarez Aguilar',M,y);doc.text('Firma y aclaracion del responsable',M+105,y);y+=4;
  doc.text('Tec. Higiene y Seguridad Alimentaria',M,y);doc.text('Establecimiento: '+(auditoria.establecimiento||''),M+105,y);y+=4;
  doc.text('INOCUA tec Servicios - Auditoria BPM Modalidad A',M,y);
  const totalPags=doc.getNumberOfPages();
  for(let i=1;i<=totalPags;i++){
    doc.setPage(i);doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text('INOCUA tec Servicios | Auditoria BPM | Pagina '+String(i)+' de '+String(totalPags),M,290);
    doc.text(new Date().toLocaleDateString('es-AR'),W-M-20,290);
  }
  doc.save('BPM_'+(auditoria.establecimiento||'auditoria')+'_'+(auditoria.fecha||'')+'.pdf');
}

function Login({onLogin}){
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [cargando,setCargando]=useState(false);const [error,setError]=useState('');
  const login=async()=>{
    if(!email||!pass){setError('Completa email y contrasena');return;}
    setCargando(true);setError('');
    const {data,error:e}=await supabase.auth.signInWithPassword({email,password:pass});
    if(e){setError('Email o contrasena incorrectos');setCargando(false);return;}
    const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',data.user.id).maybeSingle();
    setCargando(false);
    if(cliente)onLogin({tipo:'cliente',user:data.user,cliente});
    else onLogin({tipo:'auditor',user:data.user});
  };
  return(
    <div className="login-wrap"><div className="login-box">
      <h2>INOCUA tec</h2><p>Sistema de Auditorias BPM</p>
      {error&&<div className="alert error">{error}</div>}
      <label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com"/>
      <label>Contrasena</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="********" onKeyDown={e=>e.key==='Enter'&&login()}/>
      <button className="btn btn-primary" style={{width:'100%',marginTop:4}} onClick={login} disabled={cargando}>
        {cargando&&<span className="spinner"></span>}{cargando?'Ingresando...':'Ingresar'}
      </button>
    </div></div>
  );
}

function SubirFotos({auditoriaId}){
  const [fotos,setFotos]=useState([]);const [subiendo,setSubiendo]=useState(false);const [msg,setMsg]=useState('');const inputRef=useRef();
  useEffect(()=>{cargarFotos();},[auditoriaId]);
  const cargarFotos=async()=>{
    const {data}=await supabase.storage.from('evidencias').list(auditoriaId+'/');
    if(data){const urls=data.map(f=>{const {data:u}=supabase.storage.from('evidencias').getPublicUrl(auditoriaId+'/'+f.name);return{name:f.name,url:u.publicUrl};});setFotos(urls);}
  };
  const subirArchivo=async(e)=>{
    const files=Array.from(e.target.files);if(!files.length)return;
    setSubiendo(true);setMsg('');
    for(const file of files){const nombre=Date.now()+'_'+file.name;await supabase.storage.from('evidencias').upload(auditoriaId+'/'+nombre,file);}
    setSubiendo(false);setMsg('OK: '+files.length+' archivo(s) subido(s)');cargarFotos();inputRef.current.value='';
  };
  return(
    <div>
      <div className="upload-area" onClick={()=>inputRef.current.click()}>
        <div style={{fontSize:32}}>+</div>
        <p style={{color:'#999',fontSize:13,marginTop:8}}>Clic para subir fotos o documentos (JPG, PNG, PDF)</p>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={subirArchivo}/>
      </div>
      {subiendo&&<div className="alert info" style={{marginTop:8}}>Subiendo archivos...</div>}
      {msg&&<div className="alert success" style={{marginTop:8}}>{msg}</div>}
      {fotos.length>0&&<div className="foto-grid">{fotos.map((f,i)=>f.name.endsWith('.pdf')?<a key={i} href={f.url} target="_blank" style={{display:'flex',alignItems:'center',justifyContent:'center',height:80,background:'#f8f9fa',borderRadius:4,border:'2px solid #eee',textDecoration:'none',color:'#C0392B',fontSize:12,fontWeight:'bold'}}>PDF</a>:<img key={i} src={f.url} alt={f.name} onClick={()=>window.open(f.url,'_blank')}/>)}</div>}
      {fotos.length===0&&!subiendo&&<p style={{fontSize:12,color:'#999',marginTop:8}}>Sin evidencias cargadas.</p>}
    </div>
  );
}

  return(
    <div className="card">
      <h2>{modulo.id+1}. {modulo.nombre}<span style={{float:'right',fontSize:11,fontWeight:'normal',color:'#666'}}>C:{cumple} NC:{noCumple} NA:{na}</span></h2>

      </div>
    </div>
  );
}

function NuevaAuditoria({onGuardar}){
  const [estab,setEstab]=useState('');const [domicilio,setDomicilio]=useState('');const [nroHab,setNroHab]=useState('');
  const [rubro,setRubro]=useState('');const [resp,setResp]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [condiciones,setCondiciones]=useState('');
  const [estados,setEstados]=useState(()=>MODULOS.map(m=>Array(m.items.length).fill(null)));
  const [obsMod,setObsMod]=useState(Array(MODULOS.length).fill(''));
  const [ncs,setNcs]=useState(()=>MODULOS.map(m=>Array(m.items.length).fill(null)));
  const [guardando,setGuardando]=useState(false);const [guardado,setGuardado]=useState(false);
  const [error,setError]=useState('');const [auditGuardada,setAuditGuardada]=useState(null);

  const setEstado=(modId,itemIdx,val)=>{
    setEstados(prev=>{const n=[...prev];n[modId]=[...n[modId]];n[modId][itemIdx]=val;return n;});
    if(val!=='NC')setNcs(prev=>{const n=prev.map(a=>[...a]);n[modId][itemIdx]=null;return n;});
  };
  const setObsModulo=(modId,val)=>{setObsMod(prev=>{const n=[...prev];n[modId]=val;return n;});};
  const setNcData=(modId,itemIdx,val)=>{setNcs(prev=>{const n=prev.map(a=>[...a]);n[modId][itemIdx]=val;return n;});};
  const calcular=()=>{
    let cumple=0,noCumple=0,na=0;
    estados.forEach(mod=>mod.forEach(e=>{if(e==='C')cumple++;else if(e==='NC')noCumple++;else if(e==='NA')na++;}));
    const total=cumple+noCumple;
    return{puntaje:total>0?Math.round((cumple/total)*100):0,cumple,noCumple,na};
  };
  const aplanarNCs=()=>{
    const lista=[];
    ncs.forEach((modNcs,mi)=>{modNcs.forEach((nc,ii)=>{if(nc&&estados[mi][ii]==='NC')lista.push({modulo:MODULOS[mi].nombre,item:MODULOS[mi].items[ii],...nc});});});
    return lista;
  };
  const guardar=async()=>{
    if(!estab){alert('Ingresa el nombre del establecimiento');return;}
    setGuardando(true);setError('');
    const {puntaje,cumple,noCumple,na}=calcular();
    const resultado=puntaje>=80?'Aprobado':'No aprobado';
    const modulosData={estados,observaciones_modulos:obsMod,domicilio,nroHab,rubro,condiciones,no_conformidades:aplanarNCs(),resumen:{cumple,noCumple,na},
      detalle:MODULOS.map((m,mi)=>({nombre:m.nombre,cumple:estados[mi].filter(e=>e==='C').length,noCumple:estados[mi].filter(e=>e==='NC').length,na:estados[mi].filter(e=>e==='NA').length,obs:obsMod[mi]}))};
    const {data,error:err}=await supabase.from('auditorias').insert([{establecimiento:estab,responsable:resp,fecha,puntaje,resultado,modulos:modulosData}]).select();
    setGuardando(false);
    if(err){setError('Error: '+err.message);return;}
    setAuditGuardada(data[0]);onGuardar(data[0]);setGuardado(true);
  };
  const ncTotal=aplanarNCs().filter(nc=>nc.accion_correctiva).length;
  const ncSinGestionar=estados.flat().filter(e=>e==='NC').length-ncTotal;

  if(guardado)return(
    <div className="card">
      <div className="alert success">Auditoria guardada correctamente.</div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <button className="btn btn-pdf" onClick={()=>generarPDF(auditGuardada)}>Descargar PDF</button>
        <button className="btn btn-primary" onClick={()=>{setEstab('');setDomicilio('');setNroHab('');setRubro('');setResp('');setCondiciones('');setEstados(MODULOS.map(m=>Array(m.items.length).fill(null)));setObsMod(Array(MODULOS.length).fill(''));setNcs(MODULOS.map(m=>Array(m.items.length).fill(null)));setGuardado(false);setAuditGuardada(null);}}>Nueva auditoria</button>
      </div>
      <h2 style={{color:'#1B4F72',marginBottom:12}}>Subir evidencias</h2>
      {auditGuardada&&<SubirFotos auditoriaId={auditGuardada.id}/>}
    </div>
  );

  const {puntaje,cumple,noCumple}=calcular();
  return(
    <div>
      {error&&<div className="alert error">{error}</div>}
      <div className="card">
        <h2>Datos del establecimiento</h2>
        <label>Establecimiento / Razon social *</label><input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Nombre del establecimiento"/>
        <label>Domicilio</label><input value={domicilio} onChange={e=>setDomicilio(e.target.value)} placeholder="Direccion"/>
        <label>N de habilitacion</label><input value={nroHab} onChange={e=>setNroHab(e.target.value)} placeholder="Numero de habilitacion municipal"/>
        <label>Rubro / Actividad</label><input value={rubro} onChange={e=>setRubro(e.target.value)} placeholder="Ej: Panaderia, Restaurante, Catering..."/>
        <label>Responsable presente</label><input value={resp} onChange={e=>setResp(e.target.value)} placeholder="Nombre y apellido"/>
        <label>Fecha de auditoria</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        <label>Condiciones generales al inicio</label><textarea rows={2} value={condiciones} onChange={e=>setCondiciones(e.target.value)} placeholder="Descripcion de las condiciones generales al momento de iniciar la auditoria"/>
      </div>
      {MODULOS.map((mod,mi)=>(
        <ModuloChecklist key={mi} moduloIdx={mi} modulo={mod} estados={estados[mi]} obsMod={obsMod[mi]} ncsModulo={ncs[mi]}
          onEstado={(idx,val)=>setEstado(mi,idx,val)} onObsMod={val=>setObsModulo(mi,val)} onNcChange={(idx,val)=>setNcData(mi,idx,val)}/>
      ))}
      <div className="card">
        <h2>Resumen</h2>
        <div className="grid4" style={{marginBottom:16}}>
          <div className="stat"><div className="num" style={{color:'#1E8449'}}>{cumple}</div><div className="label">Cumplen</div></div>
          <div className="stat"><div className="num" style={{color:'#C0392B'}}>{noCumple}</div><div className="label">No cumplen</div></div>
          <div className="stat"><div className="num">{puntaje}%</div><div className="label">Puntaje</div></div>
          <div className="stat"><span className={'badge '+(puntaje>=80?'verde':'rojo')} style={{fontSize:14,padding:'6px 12px',marginTop:8,display:'inline-block'}}>{puntaje>=80?'APROBADO':'NO APROBADO'}</span></div>
        </div>
        {ncSinGestionar>0&&<div className="alert warning" style={{marginBottom:12}}>Tenes {ncSinGestionar} NC sin accion correctiva. Podes guardar igual o completarlas primero.</div>}
        {ncTotal>0&&<div className="alert info" style={{marginBottom:12}}>{ncTotal} accion(es) correctiva(s) registrada(s) — se incluiran en el PDF.</div>}
        <button className="btn btn-success" onClick={guardar} disabled={guardando}>
          {guardando&&<span className="spinner"></span>}{guardando?'Guardando...':'Guardar auditoria'}
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD CON ELIMINAR ─────────────────────────────────
function Dashboard({auditorias,cargando,onVerEvidencias,onEliminar}){
  const total=auditorias.length;const aprobadas=auditorias.filter(a=>a.resultado==='Aprobado').length;
  const conNC=auditorias.filter(a=>(a.modulos?.resumen?.noCumple||0)>0).length;
  const promedio=total>0?Math.round(auditorias.reduce((s,a)=>s+(a.puntaje||0),0)/total):0;
  return(
    <div>
      <div className="grid2" style={{marginBottom:16}}>
        <div className="stat"><div className="num">{total}</div><div className="label">Auditorias realizadas</div></div>
        <div className="stat"><div className="num">{aprobadas}</div><div className="label">Aprobados</div></div>
        <div className="stat"><div className="num">{conNC}</div><div className="label">Con no conformidades</div></div>
        <div className="stat"><div className="num">{promedio}%</div><div className="label">Puntaje promedio</div></div>
      </div>
      <div className="card">
        <h2>Ultimas auditorias</h2>
        {cargando&&<p style={{color:'#999',fontSize:14}}>Cargando...</p>}
        {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorias registradas.</p>}
        {!cargando&&auditorias.length>0&&
          <table><thead><tr><th>Establecimiento</th><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th><th>PDF</th><th>Evidencias</th><th>Eliminar</th></tr></thead>
          <tbody>{auditorias.map((a,i)=>{
            const ncsCount=(a.modulos?.no_conformidades||[]).filter(nc=>nc&&nc.accion_correctiva).length;
            const totalNC=a.modulos?.resumen?.noCumple||0;
            return(<tr key={i}>
              <td>{a.establecimiento}</td><td>{a.fecha}</td><td>{a.puntaje}%</td>
              <td><span className={'badge '+(a.resultado==='Aprobado'?'verde':'rojo')}>{a.resultado}</span></td>
              <td>{totalNC>0?<span><span className="badge rojo">{totalNC} NC</span>{ncsCount>0&&<span className="badge azul" style={{marginLeft:4}}>{ncsCount} gest.</span>}</span>:<span style={{color:'#aaa',fontSize:12}}>—</span>}</td>
              <td><button className="btn btn-pdf" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>generarPDF(a)}>PDF</button></td>
              <td><button className="btn btn-warning" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onVerEvidencias(a)}>Ver</button></td>
              <td><button className="btn btn-danger" style={{fontSize:11,padding:'3px 8px'}} onClick={()=>onEliminar(a)}>🗑 Borrar</button></td>
            </tr>);
          })}</tbody></table>}
      </div>
    </div>
  );
}

function GestionClientes(){
  const [clientes,setClientes]=useState([]);const [email,setEmail]=useState('');const [pass,setPass]=useState('');
  const [estab,setEstab]=useState('');const [cargando,setCargando]=useState(false);const [msg,setMsg]=useState('');const [error,setError]=useState('');
  useEffect(()=>{cargarClientes();},[]);
  const cargarClientes=async()=>{const {data}=await supabase.from('clientes').select('*').order('created_at',{ascending:false});if(data)setClientes(data);};
  const crearCliente=async()=>{
    if(!email||!pass||!estab){setError('Completa todos los campos');return;}
    setCargando(true);setError('');setMsg('');
    const {data,error:e}=await supabase.auth.admin.createUser({email,password:pass,email_confirm:true});
    if(e){setError('Error: '+e.message);setCargando(false);return;}
    await supabase.from('clientes').insert([{user_id:data.user.id,establecimiento:estab,email}]);
    setMsg('Cliente "'+estab+'" creado. Email: '+email+' / Contrasena: '+pass);
    setEmail('');setPass('');setEstab('');cargarClientes();setCargando(false);
  };
  const eliminarCliente=async(c)=>{
    if(!confirm('Eliminar acceso de "'+c.establecimiento+'"?'))return;
    await supabase.auth.admin.deleteUser(c.user_id);await supabase.from('clientes').delete().eq('id',c.id);cargarClientes();
  };
  return(
    <div>
      <div className="card">
        <h2>Nuevo cliente</h2>
        {error&&<div className="alert error">{error}</div>}{msg&&<div className="alert success">{msg}</div>}
        <label>Nombre del establecimiento</label><input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panaderia San Martin"/>
        <label>Email del cliente</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="cliente@email.com"/>
        <label>Contrasena inicial</label><input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Contrasena para el cliente"/>
        <button className="btn btn-success" onClick={crearCliente} disabled={cargando}>{cargando&&<span className="spinner"></span>}{cargando?'Creando...':'Crear acceso'}</button>
      </div>
      <div className="card">
        <h2>Clientes con acceso</h2>
        {clientes.length===0&&<p style={{color:'#999',fontSize:14}}>No hay clientes registrados.</p>}
        {clientes.length>0&&<table><thead><tr><th>Establecimiento</th><th>Email</th><th>Creado</th><th>Accion</th></tr></thead>
        <tbody>{clientes.map((c,i)=>(<tr key={i}><td>{c.establecimiento}</td><td>{c.email}</td><td>{new Date(c.created_at).toLocaleDateString('es-AR')}</td><td><button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>eliminarCliente(c)}>Eliminar</button></td></tr>))}</tbody></table>}
      </div>
    </div>
  );
}

function VistaCliente({session,onLogout}){
  const {cliente}=session;const [auditorias,setAuditorias]=useState([]);const [seleccionada,setSeleccionada]=useState(null);const [cargando,setCargando]=useState(true);
  useEffect(()=>{(async()=>{const {data}=await supabase.from('auditorias').select('*').ilike('establecimiento','%'+cliente.establecimiento+'%').order('created_at',{ascending:false});if(data)setAuditorias(data);setCargando(false);})();},[]);
  return(
    <div>
      <div className="header">
        <div><h1>{cliente.establecimiento}</h1><span>Portal de evidencias - INOCUA tec</span></div>
        <button className="btn btn-danger" style={{marginLeft:'auto'}} onClick={onLogout}>Salir</button>
      </div>
      <div className="container">
        {!seleccionada?(
          <div className="card"><h2>Mis auditorias</h2>
            {cargando&&<p style={{color:'#999',fontSize:14}}>Cargando...</p>}
            {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorias registradas.</p>}
            {!cargando&&auditorias.length>0&&<table><thead><tr><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>Accion</th></tr></thead>
            <tbody>{auditorias.map((a,i)=>(<tr key={i}><td>{a.fecha}</td><td>{a.puntaje}%</td><td><span className={'badge '+(a.resultado==='Aprobado'?'verde':'rojo')}>{a.resultado}</span></td><td><button className="btn btn-primary" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>setSeleccionada(a)}>Subir evidencia</button></td></tr>))}</tbody></table>}
          </div>
        ):(
          <div className="card">
            <button className="btn btn-primary" style={{marginBottom:16,fontSize:12}} onClick={()=>setSeleccionada(null)}>Volver</button>
            <h2>Evidencias - {seleccionada.fecha}</h2><SubirFotos auditoriaId={seleccionada.id}/>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [session,setSession]=useState(null);const [tab,setTab]=useState('dashboard');
  const [auditorias,setAuditorias]=useState([]);const [cargando,setCargando]=useState(true);const [auditoriaEvidencia,setAuditoriaEvidencia]=useState(null);

  useEffect(()=>{
    supabase.auth.getSession().then(async({data})=>{
      if(data.session){
        const u=data.session.user;
        const {data:cliente}=await supabase.from('clientes').select('*').eq('user_id',u.id).maybeSingle();
        if(cliente)setSession({tipo:'cliente',user:u,cliente});
        else{setSession({tipo:'auditor',user:u});cargarAuditorias();}
      } else setCargando(false);
    });
  },[]);

  const cargarAuditorias=async()=>{
    setCargando(true);const {data}=await supabase.from('auditorias').select('*').order('created_at',{ascending:false});
    if(data)setAuditorias(data);setCargando(false);
  };

  const eliminarAuditoria=async(a)=>{
    if(!confirm('Eliminar auditoria de "'+a.establecimiento+'" del '+a.fecha+'?\nEsta accion no se puede deshacer.'))return;
    await supabase.from('auditorias').delete().eq('id',a.id);
    setAuditorias(prev=>prev.filter(x=>x.id!==a.id));
  };

  const logout=async()=>{await supabase.auth.signOut();setSession(null);setAuditorias([]);setTab('dashboard');setCargando(false);};

  if(!session)return <Login onLogin={async(s)=>{setSession(s);if(s.tipo==='auditor')cargarAuditorias();else setCargando(false);}}/>;
  if(session.tipo==='cliente')return <VistaCliente session={session} onLogout={logout}/>;

  return(
    <div>
      <div className="header">
        <div><h1>INOCUA tec Servicios</h1><span>Sistema de Auditorias BPM - Panel Auditor</span></div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:11,opacity:0.7}}>{cargando?'Cargando...':auditorias.length+' auditorias'}</span>
          <button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={logout}>Salir</button>
        </div>
      </div>
      <div className="nav">
        <button className={tab==='dashboard'?'active':''} onClick={()=>{setTab('dashboard');setAuditoriaEvidencia(null);}}>Dashboard</button>
        <button className={tab==='nueva'?'active':''} onClick={()=>{setTab('nueva');setAuditoriaEvidencia(null);}}>Nueva auditoria</button>
        <button className={tab==='clientes'?'active':''} onClick={()=>{setTab('clientes');setAuditoriaEvidencia(null);}}>Clientes</button>
      </div>
      <div className="container">
        {tab==='dashboard'&&!auditoriaEvidencia&&
          <Dashboard auditorias={auditorias} cargando={cargando} onVerEvidencias={a=>setAuditoriaEvidencia(a)} onEliminar={eliminarAuditoria}/>}
        {tab==='dashboard'&&auditoriaEvidencia&&(
          <div className="card">
            <button className="btn btn-primary" style={{marginBottom:16,fontSize:12}} onClick={()=>setAuditoriaEvidencia(null)}>Volver</button>
            <h2>Evidencias - {auditoriaEvidencia.establecimiento} ({auditoriaEvidencia.fecha})</h2>
            <SubirFotos auditoriaId={auditoriaEvidencia.id}/>
          </div>
        )}
        {tab==='nueva'&&<NuevaAuditoria onGuardar={a=>{setAuditorias(p=>[a,...p]);}}/>}
        {tab==='clientes'&&<GestionClientes/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
