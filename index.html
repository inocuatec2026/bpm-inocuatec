label{font-size:13px;color:#555;display:block;margin-bottom:4px}

.alert.info{background:#D6EAF8;color:#1B4F72;border-left:4px solid #1B4F72}

// ── LOGIN ──────────────────────────────────────────────────
function Login({onLogin}){
  const [modo,setModo]=useState('auditor');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [estab,setEstab]=useState('');
  const [cargando,setCargando]=useState(false);
  const [error,setError]=useState('');
  const [msg,setMsg]=useState('');

  const loginAuditor=async()=>{
    if(!email||!pass){setError('Completá email y contraseña');return;}
    setCargando(true);setError('');
    const {data,error:e}=await supabase.auth.signInWithPassword({email,password:pass});
    setCargando(false);
    if(e){setError('Email o contraseña incorrectos');return;}
    onLogin({tipo:'auditor',user:data.user});
  };

  const loginEstablecimiento=async()=>{
    if(!estab){setError('Ingresá el nombre del establecimiento');return;}
    setCargando(true);setError('');
    // Busca auditorías de ese establecimiento
    const {data,error:e}=await supabase.from('auditorias')
      .select('*').ilike('establecimiento',estab).order('created_at',{ascending:false});
    setCargando(false);
    if(e||!data||data.length===0){
      setError('No se encontró ese establecimiento. Verificá el nombre exacto.');return;
    }
    onLogin({tipo:'establecimiento',establecimiento:estab,auditorias:data});
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <h2>INOCUA°tec</h2>
        <p>Sistema de Auditorías BPM</p>
        <div className="tab-group">
          <button className={modo==='auditor'?'active':''} onClick={()=>{setModo('auditor');setError('');}}>🔑 Auditor</button>
          <button className={modo==='establecimiento'?'active':''} onClick={()=>{setModo('establecimiento');setError('');}}>🏪 Establecimiento</button>
        </div>
        {error&&<div className="alert error">{error}</div>}
        {msg&&<div className="alert success">{msg}</div>}
        {modo==='auditor'?(
          <>
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com"/>
            <label>Contraseña</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"/>
            <button className="btn btn-primary" style={{width:'100%'}} onClick={loginAuditor} disabled={cargando}>
              {cargando&&<span className="spinner"></span>}{cargando?'Ingresando...':'Ingresar como auditor'}
            </button>
          </>
        ):(
          <>
            <div className="alert info">Ingresá el nombre exacto de tu establecimiento tal como figura en las auditorías.</div>
            <label>Nombre del establecimiento</label>
            <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panadería San Martín"/>
            <button className="btn btn-success" style={{width:'100%'}} onClick={loginEstablecimiento} disabled={cargando}>
              {cargando&&<span className="spinner"></span>}{cargando?'Buscando...':'Ver mis auditorías'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── SUBIDA DE FOTOS ────────────────────────────────────────
function SubirFotos({auditoriaId,establecimiento}){
  const [fotos,setFotos]=useState([]);
  const [subiendo,setSubiendo]=useState(false);
  const [msg,setMsg]=useState('');
  const inputRef=useRef();

  useEffect(()=>{cargarFotos();},[auditoriaId]);

  const cargarFotos=async()=>{
    const {data}=await supabase.storage.from('evidencias').list(`${auditoriaId}/`);
    if(data){
      const urls=data.map(f=>{
        const {data:u}=supabase.storage.from('evidencias').getPublicUrl(`${auditoriaId}/${f.name}`);
        return{name:f.name,url:u.publicUrl};
      });
      setFotos(urls);
    }
  };

  const subirArchivo=async(e)=>{
    const files=Array.from(e.target.files);
    if(!files.length)return;
    setSubiendo(true);setMsg('');
    for(const file of files){
      const nombre=`${Date.now()}_${file.name}`;
      await supabase.storage.from('evidencias').upload(`${auditoriaId}/${nombre}`,file);
    }
    setSubiendo(false);
    setMsg(`✅ ${files.length} archivo(s) subido(s) correctamente`);
    cargarFotos();
    inputRef.current.value='';
  };

  return(
    <div>
      <div className="upload-area" onClick={()=>inputRef.current.click()}>
        <div style={{fontSize:32}}>📎</div>
        <p>Hacé clic para subir fotos o documentos<br/><small>JPG, PNG, PDF — hasta 50MB</small></p>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={subirArchivo}/>
      </div>
      {subiendo&&<div className="alert info" style={{marginTop:8}}><span className="spinner" style={{borderColor:'#1B4F72',borderTopColor:'transparent'}}></span> Subiendo archivos...</div>}
      {msg&&<div className="alert success" style={{marginTop:8}}>{msg}</div>}
      {fotos.length>0&&(
        <div className="foto-grid" style={{marginTop:12}}>
          {fotos.map((f,i)=>
            f.url.endsWith('.pdf')?
            <a key={i} href={f.url} target="_blank" style={{display:'flex',alignItems:'center',justifyContent:'center',height:80,background:'#f8f9fa',borderRadius:4,border:'2px solid #eee',textDecoration:'none',color:'#C0392B',fontSize:12,fontWeight:'bold'}}>📄 PDF</a>:
            <img key={i} src={f.url} alt={f.name} onClick={()=>window.open(f.url,'_blank')}/>
          )}
        </div>
      )}
      {fotos.length===0&&!subiendo&&<p style={{fontSize:12,color:'#999',marginTop:8}}>No hay evidencias cargadas aún.</p>}
    </div>
  );
}

// ── DASHBOARD AUDITOR ──────────────────────────────────────

  const conNC=auditorias.filter(a=>(a.modulos?.ncs||0)>0).length;
  const promedio=total>0?Math.round(auditorias.reduce((s,a)=>s+(a.puntaje||0),0)/total):0;
  return(
    <div>
      <div className="grid2" style={{marginBottom:16}}>
        <div className="stat"><div className="num">{total}</div><div className="label">Auditorías realizadas</div></div>
        <div className="stat"><div className="num">{aprobadas}</div><div className="label">Establecimientos aprobados</div></div>
        <div className="stat"><div className="num">{conNC}</div><div className="label">Con no conformidades</div></div>
        <div className="stat"><div className="num">{promedio}%</div><div className="label">Puntaje promedio</div></div>
      </div>
      <div className="card">
        <h2>Últimas auditorías</h2>
        {cargando&&<p style={{color:'#999',fontSize:14}}>⏳ Cargando desde Supabase...</p>}
        {!cargando&&auditorias.length===0&&<p style={{color:'#999',fontSize:14}}>No hay auditorías registradas aún.</p>}
        {!cargando&&auditorias.length>0&&
          <table><thead><tr><th>Establecimiento</th><th>Responsable</th><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th><th>Evidencias</th></tr></thead>
          <tbody>{auditorias.map((a,i)=>(
            <tr key={i}>

// ── NUEVA AUDITORÍA ────────────────────────────────────────
function NuevaAuditoria({onGuardar}){
  const [estab,setEstab]=useState('');
  const [resp,setResp]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [respuestas,setRespuestas]=useState({});
  const [obs,setObs]=useState({});
  const [guardando,setGuardando]=useState(false);
  const [guardado,setGuardado]=useState(false);
  const [error,setError]=useState('');
  const [auditoriaGuardada,setAuditoriaGuardada]=useState(null);

  const setR=(i,v)=>setRespuestas(p=>({...p,[i]:v}));
  const setO=(i,v)=>setObs(p=>({...p,[i]:v}));

  const calcular=()=>{
    const respondidos=Object.keys(respuestas).length;
    if(respondidos===0)return{puntaje:0,ncs:0};
    const ok=Object.values(respuestas).filter(v=>v==='C').length;
    const ncs=Object.values(respuestas).filter(v=>v==='NC').length;
    return{puntaje:Math.round((ok/respondidos)*100),ncs};
  };

  const guardar=async()=>{
    if(!estab){alert('Ingresá el nombre del establecimiento');return;}
    setGuardando(true);setError('');
    const {puntaje,ncs}=calcular();
    const resultado=puntaje>=80?'Aprobado':'No aprobado';
    const modulosData={
      respuestas,observaciones:obs,ncs,
      detalle:MODULOS.map((nombre,mi)=>{
        const criteriosMod=CRITERIOS_BASE.filter(c=>c.mod===mi);
        const conformes=criteriosMod.filter((_,ci)=>respuestas[`${mi}-${ci}`]==='C').length;
        const total=criteriosMod.filter((_,ci)=>respuestas[`${mi}-${ci}`]).length;
        return{nombre,puntaje:total>0?Math.round((conformes/total)*100):null};
      })
    };
    const {data,error:err}=await supabase.from('auditorias').insert([{
      establecimiento:estab,responsable:resp,fecha,puntaje,resultado,modulos:modulosData
    }]).select();
    setGuardando(false);
    if(err){setError('Error al guardar: '+err.message);return;}
    setAuditoriaGuardada(data[0]);
    onGuardar(data[0]);
    setGuardado(true);
  };

  if(guardado)return(
    <div>
      <div className="card">
        <div className="alert success">✅ Auditoría guardada correctamente en Supabase.</div>
        <p style={{fontSize:13,color:'#666',marginBottom:16}}>Podés subir fotos o documentos de evidencia ahora mismo:</p>
        {auditoriaGuardada&&<SubirFotos auditoriaId={auditoriaGuardada.id} establecimiento={estab}/>}
        <div style={{marginTop:16}}>
          <button className="btn btn-primary" onClick={()=>{setEstab('');setResp('');setRespuestas({});setObs({});setGuardado(false);setError('');setAuditoriaGuardada(null);}}>Nueva auditoría</button>
        </div>
      </div>
    </div>
  );

  const {puntaje,ncs}=calcular();
  return(
    <div>
      {error&&<div className="alert error">{error}</div>}
      <div className="card">
        <h2>Datos del establecimiento</h2>
        <label>Nombre del establecimiento *</label>
        <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panadería San Martín"/>
        <label>Responsable / Titular</label>
        <input value={resp} onChange={e=>setResp(e.target.value)} placeholder="Nombre completo"/>
        <label>Fecha de auditoría</label>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
      </div>
      {MODULOS.map((mod,mi)=>(
        <div className="card" key={mi}>
          <h2>{mi+1}. {mod}</h2>
          {CRITERIOS_BASE.filter(c=>c.mod===mi).map((c,ci)=>{
            const idx=`${mi}-${ci}`;
            return(
              <div key={idx} style={{marginBottom:16,paddingBottom:16,borderBottom:'1px solid #eee'}}>
                <p style={{fontSize:14,marginBottom:8}}>{c.texto}</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  {['C','NC','NA'].map(v=>(
                    <button key={v} className="btn" onClick={()=>setR(idx,v)}
                      style={{background:respuestas[idx]===v?(v==='C'?'#1E8449':v==='NC'?'#C0392B':'#888'):'#eee',
                        color:respuestas[idx]===v?'white':'#333',flex:1}}>
                      {v==='C'?'✅ Conforme':v==='NC'?'❌ No conforme':'— N/A'}
                    </button>
                  ))}
                </div>
                {respuestas[idx]==='NC'&&(
                  <textarea rows={2} placeholder="Observación / acción correctiva..." value={obs[idx]||''} onChange={e=>setO(idx,e.target.value)}/>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div className="card">
        <h2>Resumen</h2>
        <div className="grid2">
          <div className="stat"><div className="num">{puntaje}%</div><div className="label">Puntaje</div></div>
          <div className="stat"><div className="num">{ncs}</div><div className="label">No conformidades</div></div>
        </div>
        <div style={{marginTop:16}}>
          <span className={`badge ${puntaje>=80?'verde':'rojo'}`} style={{fontSize:14,padding:'6px 16px'}}>
            {puntaje>=80?'✅ APROBADO':'❌ NO APROBADO'}
          </span>
        </div>
        <div style={{marginTop:16}}>
          <button className="btn btn-success" onClick={guardar} disabled={guardando}>
            {guardando&&<span className="spinner"></span>}
            {guardando?'Guardando...':'💾 Guardar auditoría'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PanelEvidencias({auditoria,onVolver}){
  return(
    <div className="card">
      <button className="btn btn-primary" style={{marginBottom:16,fontSize:12}} onClick={onVolver}>← Volver</button>
      <h2>Evidencias — {auditoria.establecimiento} ({auditoria.fecha})</h2>
      <SubirFotos auditoriaId={auditoria.id} establecimiento={auditoria.establecimiento}/>
    </div>
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [auditorias,setAuditorias]=useState([]);
  const [cargando,setCargando]=useState(true);
  const [auditoriaEvidencia,setAuditoriaEvidencia]=useState(null);

  useEffect(()=>{
    // Verificar si hay sesión activa de auditor
    supabase.auth.getSession().then(({data})=>{
      if(data.session){
        setSession({tipo:'auditor',user:data.session.user});
        cargarAuditorias();
      } else {
        setCargando(false);
      }
    });
    supabase.auth.onAuthStateChange((_,s)=>{
      if(s){setSession({tipo:'auditor',user:s.user});cargarAuditorias();}
    });
  },[]);

  const cargarAuditorias=async()=>{
    setCargando(true);
    const {data,error}=await supabase.from('auditorias').select('*').order('created_at',{ascending:false});
    if(!error&&data)setAuditorias(data);
    setCargando(false);
  };

  const logout=async()=>{
    await supabase.auth.signOut();
    setSession(null);setAuditorias([]);setTab('dashboard');
  };

  if(!session) return <Login onLogin={(s)=>{
    setSession(s);
    if(s.tipo==='auditor') cargarAuditorias();
    else setCargando(false);
  }}/>;

  if(session.tipo==='establecimiento')
    return <VistaEstablecimiento session={session} onLogout={()=>setSession(null)}/>;

  // Vista auditor
  return(
    <div>
      <div className="header">
        <div>
          <h1>INOCUA°tec Servicios</h1>
          <span>Sistema de Auditorías BPM — Panel Auditor</span>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:11,opacity:0.7}}>{cargando?'⏳ Sincronizando...':'✅ '+auditorias.length+' auditorías'}</span>
          <button className="btn btn-danger" style={{fontSize:12,padding:'4px 10px'}} onClick={logout}>Salir</button>
        </div>
      </div>
      <div className="nav">
        <button className={tab==='dashboard'?'active':''} onClick={()=>{setTab('dashboard');setAuditoriaEvidencia(null);}}>📊 Dashboard</button>
        <button className={tab==='nueva'?'active':''} onClick={()=>{setTab('nueva');setAuditoriaEvidencia(null);}}>➕ Nueva auditoría</button>
      </div>
      <div className="container">
        {tab==='dashboard'&&!auditoriaEvidencia&&
          <Dashboard auditorias={auditorias} cargando={cargando} onVerEvidencias={a=>{setAuditoriaEvidencia(a);}}/>}
        {tab==='dashboard'&&auditoriaEvidencia&&
          <PanelEvidencias auditoria={auditoriaEvidencia} onVolver={()=>setAuditoriaEvidencia(null)}/>}
        {tab==='nueva'&&
          <NuevaAuditoria onGuardar={a=>{setAuditorias(p=>[a,...p]);}}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
