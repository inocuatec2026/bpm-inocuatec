<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INOCUA°tec — Sistema BPM</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#333}
.header{background:#1B4F72;color:white;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px}
.header span{font-size:12px;opacity:0.8}
.nav{background:#154360;display:flex;gap:4px;padding:8px 24px}
.nav button{background:transparent;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:14px}
.nav button.active,.nav button:hover{background:#1B4F72}
.container{max-width:1000px;margin:24px auto;padding:0 16px}
.card{background:white;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.card h2{color:#1B4F72;margin-bottom:16px;font-size:16px;border-bottom:2px solid #D6EAF8;padding-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.badge.verde{background:#D5F5E3;color:#1E8449}
.badge.rojo{background:#FADBD8;color:#C0392B}
.badge.amarillo{background:#FEF9E7;color:#D4AC0D}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
.btn-primary{background:#1B4F72;color:white}
.btn-success{background:#1E8449;color:white}
.btn-danger{background:#C0392B;color:white}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat{text-align:center;padding:16px;background:#D6EAF8;border-radius:8px}
.stat .num{font-size:32px;font-weight:bold;color:#1B4F72}
.stat .label{font-size:12px;color:#666;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#1B4F72;color:white;padding:10px;text-align:left}
td{padding:10px;border-bottom:1px solid #eee}
tr:hover td{background:#f8f9fa}
input,select,textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;margin-bottom:12px}
label{font-size:13px;color:#555;display:block;margin-bottom:4px}
.alert{padding:12px;border-radius:4px;margin-bottom:12px;font-size:14px}
.alert.info{background:#D6EAF8;color:#1B4F72;border-left:4px solid #1B4F72}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const MODULOS = [
  "Instalaciones","Equipos y utensilios","Personal","Materias primas",
  "Proceso productivo","Almacenamiento","Transporte","Control de plagas",
  "Agua y hielo","Residuos","Documentación","Trazabilidad"
];

const CRITERIOS_BASE = [
  {mod:0,texto:"Pisos, paredes y techos en buen estado y limpios"},
  {mod:0,texto:"Iluminación adecuada en todas las áreas"},
  {mod:0,texto:"Ventilación suficiente sin contaminación cruzada"},
  {mod:1,texto:"Equipos limpios y en buen estado de mantenimiento"},
  {mod:1,texto:"Superficies de contacto con alimentos aptas (inox o apto alimentario)"},
  {mod:2,texto:"Personal con indumentaria limpia y completa"},
  {mod:2,texto:"Ausencia de joyas, uñas cortas y limpias"},
  {mod:2,texto:"Lavado de manos correcto y frecuente"},
  {mod:3,texto:"Materias primas con documentación de origen (remitos/certificados)"},
  {mod:3,texto:"Correcta separación de MP y PT en almacenamiento"},
  {mod:4,texto:"Temperaturas de proceso controladas y registradas"},
  {mod:4,texto:"No hay contaminación cruzada entre crudos y cocidos"},
  {mod:5,texto:"Almacenamiento en condiciones correctas (temperatura, humedad)"},
  {mod:5,texto:"Sistema PEPS aplicado correctamente"},
  {mod:6,texto:"Vehículos de transporte limpios y con temperatura controlada"},
  {mod:7,texto:"Plan de control de plagas vigente con empresa habilitada"},
  {mod:7,texto:"Sin evidencia de plagas o vectores"},
  {mod:8,texto:"Agua potable con análisis fisicoquímico y bacteriológico vigente"},
  {mod:9,texto:"Residuos contenidos, identificados y con retiro frecuente"},
  {mod:10,texto:"Manual BPM disponible y actualizado"},
  {mod:10,texto:"Registros de limpieza y desinfección al día"},
  {mod:11,texto:"Sistema de trazabilidad implementado y operativo"},
];

function Dashboard({auditorias}){
  const total = auditorias.length;
  const aprobadas = auditorias.filter(a=>a.resultado==="Aprobado").length;
  const conNC = auditorias.filter(a=>a.ncs>0).length;
  return(
    <div>
      <div className="grid2" style={{marginBottom:16}}>
        <div className="stat"><div className="num">{total}</div><div className="label">Auditorías realizadas</div></div>
        <div className="stat"><div className="num">{aprobadas}</div><div className="label">Establecimientos aprobados</div></div>
        <div className="stat"><div className="num">{conNC}</div><div className="label">Con no conformidades</div></div>
        <div className="stat"><div className="num">{total>0?Math.round(auditorias.reduce((s,a)=>s+a.puntaje,0)/total):0}%</div><div className="label">Puntaje promedio</div></div>
      </div>
      <div className="card">
        <h2>Últimas auditorías</h2>
        {auditorias.length===0?<p style={{color:'#999',fontSize:14}}>No hay auditorías registradas aún.</p>:
        <table><thead><tr><th>Establecimiento</th><th>Fecha</th><th>Puntaje</th><th>Resultado</th><th>NCs</th></tr></thead>
        <tbody>{auditorias.slice().reverse().map((a,i)=>(
          <tr key={i}>
            <td>{a.establecimiento}</td>
            <td>{a.fecha}</td>
            <td>{a.puntaje}%</td>
            <td><span className={`badge ${a.resultado==='Aprobado'?'verde':'rojo'}`}>{a.resultado}</span></td>
            <td>{a.ncs}</td>
          </tr>
        ))}</tbody></table>}
      </div>
    </div>
  );
}

function NuevaAuditoria({onGuardar}){
  const [estab,setEstab]=useState('');
  const [resp,setResp]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().split('T')[0]);
  const [respuestas,setRespuestas]=useState({});
  const [obs,setObs]=useState({});
  const [guardado,setGuardado]=useState(false);

  const setR=(i,v)=>setRespuestas(p=>({...p,[i]:v}));
  const setO=(i,v)=>setObs(p=>({...p,[i]:v}));

  const calcular=()=>{
    const respondidos=Object.keys(respuestas).length;
    if(respondidos===0)return{puntaje:0,ncs:0};
    const ok=Object.values(respuestas).filter(v=>v==='C').length;
    const ncs=Object.values(respuestas).filter(v=>v==='NC').length;
    return{puntaje:Math.round((ok/respondidos)*100),ncs};
  };

  const guardar=()=>{
    if(!estab){alert('Ingresá el nombre del establecimiento');return;}
    const {puntaje,ncs}=calcular();
    onGuardar({establecimiento:estab,responsable:resp,fecha,puntaje,ncs,
      resultado:puntaje>=80?'Aprobado':'No aprobado',respuestas,observaciones:obs});
    setGuardado(true);
  };

  if(guardado)return(
    <div className="card">
      <div className="alert info">✅ Auditoría guardada correctamente.</div>
      <button className="btn btn-primary" onClick={()=>{setEstab('');setResp('');setRespuestas({});setObs({});setGuardado(false);}}>Nueva auditoría</button>
    </div>
  );

  const {puntaje,ncs}=calcular();

  return(
    <div>
      <div className="card">
        <h2>Datos del establecimiento</h2>
        <label>Nombre del establecimiento *</label>
        <input value={estab} onChange={e=>setEstab(e.target.value)} placeholder="Ej: Panadería San Martín"/>
        <label>Responsable / Titular</label>
        <input value={resp} onChange={e=>setResp(e.target.value)} placeholder="Nombre completo"/>
        <label>Fecha de auditoría</label>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
      </div>
      {MODULOS.map((mod,mi)=>(
        <div className="card" key={mi}>
          <h2>{mi+1}. {mod}</h2>
          {CRITERIOS_BASE.filter(c=>c.mod===mi).map((c,ci)=>{
            const idx=`${mi}-${ci}`;
            return(
              <div key={idx} style={{marginBottom:16,paddingBottom:16,borderBottom:'1px solid #eee'}}>
                <p style={{fontSize:14,marginBottom:8}}>{c.texto}</p>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  {['C','NC','NA'].map(v=>(
                    <button key={v} className="btn" onClick={()=>setR(idx,v)}
                      style={{background:respuestas[idx]===v?(v==='C'?'#1E8449':v==='NC'?'#C0392B':'#888'):'#eee',
                        color:respuestas[idx]===v?'white':'#333',flex:1}}>
                      {v==='C'?'✅ Conforme':v==='NC'?'❌ No conforme':'— N/A'}
                    </button>
                  ))}
                </div>
                {respuestas[idx]==='NC'&&(
                  <textarea rows={2} placeholder="Observación / acción correctiva..." value={obs[idx]||''} onChange={e=>setO(idx,e.target.value)}/>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div className="card">
        <h2>Resumen</h2>
        <div className="grid2">
          <div className="stat"><div className="num">{puntaje}%</div><div className="label">Puntaje</div></div>
          <div className="stat"><div className="num">{ncs}</div><div className="label">No conformidades</div></div>
        </div>
        <div style={{marginTop:16}}>
          <span className={`badge ${puntaje>=80?'verde':'rojo'}`} style={{fontSize:14,padding:'6px 16px'}}>
            {puntaje>=80?'✅ APROBADO':'❌ NO APROBADO'}
          </span>
        </div>
        <div style={{marginTop:16}}>
          <button className="btn btn-success" onClick={guardar}>💾 Guardar auditoría</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('dashboard');
  const [auditorias,setAuditorias]=useState([]);
  const agregar=(a)=>setAuditorias(p=>[...p,a]);

  return(
    <div>
      <div className="header">
        <div>
          <h1>INOCUA°tec Servicios</h1>
          <span>Sistema de Auditorías BPM — Panel Auditor</span>
        </div>
      </div>
      <div className="nav">
        <button className={tab==='dashboard'?'active':''} onClick={()=>setTab('dashboard')}>📊 Dashboard</button>
        <button className={tab==='nueva'?'active':''} onClick={()=>setTab('nueva')}>➕ Nueva auditoría</button>
      </div>
      <div className="container">
        {tab==='dashboard'&&<Dashboard auditorias={auditorias}/>}
        {tab==='nueva'&&<NuevaAuditoria onGuardar={a=>{agregar(a);setTab('dashboard');}}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
